<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #0e3d06; user-select: none;
        }

        #world-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/background/background.png?raw=true');
            background-size: cover; background-position: center; z-index: -1; 
        }

        /* --- TOP RESOURCE BAR --- */
        #resource-bar {
            position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; 
            gap: 8px; z-index: 1000; align-items: flex-end;
        }
        .res-item {
            background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 20px;
            display: flex; align-items: center; padding: 2px 15px; min-width: 160px; justify-content: space-between;
            color: white; font-size: 18px; text-shadow: 2px 2px #000;
        }
        .res-icon { width: 35px; height: 35px; margin-left: 10px; }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999; cursor: pointer;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- GAME ENGINE --- */
        #game-viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #map-container {
            position: absolute; width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d;
        }
        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(40, 1fr); grid-template-rows: repeat(40, 1fr);
        }
        .tile { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

        /* --- BUILDINGS --- */
        .building {
            position: absolute; bottom: 10%; left: 50%; width: 200%; height: 300%;
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            transform: translate(-50%, 0) rotateZ(45deg) rotateX(-90deg);
            transform-origin: bottom center; z-index: 10; pointer-events: none;
        }
        .size-4x4 { width: 400%; height: 600%; }

        .collect-bubble {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; background: white; border: 3px solid #333;
            border-radius: 50%; z-index: 20; cursor: pointer; pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            animation: bounce 2s infinite ease-in-out;
        }
        .collect-bubble img { width: 70%; }
        @keyframes bounce { 0%, 100% { top: -60px; } 50% { top: -75px; } }

        /* --- UI --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .shop-btn { width: 120px; cursor: pointer; }
        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center;
        }
        .shop-container { width: 80vw; height: 60vh; background: #d3d7c6; border: 4px solid #1a1a1a; border-radius: 12px; position: relative; padding: 20px; }
    </style>
</head>
<body>

    <div id="resource-bar">
        <div class="res-item"><span id="gold-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/coin.png?raw=true"></div>
        <div class="res-item"><span id="elixir-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/elixir.png?raw=true"></div>
        <div class="res-item"><span id="dark-elixir-val">0</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/dark_elixir.png?raw=true"></div>
        <div class="res-item"><span id="gem-val">500</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/gem.png?raw=true"></div>
    </div>

    <div id="intro-overlay">
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
        <p style="color:white; position:absolute; bottom:15%;">CLICK TO START</p>
    </div>

    <audio id="bg-music"></audio>
    <audio id="intro-audio"><source src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/main/audio/coc-intro.mp3" type="audio/mpeg"></audio>

    <div id="game-viewport">
        <div id="map-container">
            <div id="grid-layer" class="grid-layer"></div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" class="shop-btn" id="shop-trigger">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <button id="close-shop">CLOSE</button>
            <h2 style="text-align:center; color:black;">SHOP</h2>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                <div class="shop-item" data-type="gold_mine" style="cursor:pointer; text-align:center; color:black;">
                    <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/gold_mine.png?raw=true" width="80"><br>Gold Mine
                </div>
                <div class="shop-item" data-type="elixir_collector" style="cursor:pointer; text-align:center; color:black;">
                    <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/elixir_collector.png?raw=true" width="80"><br>Elixir Collector
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE CONFIG (REPLACE THIS WITH YOURS) ---
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GAME VARIABLES ---
        let resources = { gold: 750, elixir: 750, dark: 0, gems: 500 };
        let buildingsData = []; // To store building positions
        let mapX = (window.innerWidth/2)-1200, mapY = (window.innerHeight/2)-800;
        let isMouseDown = false, isDragging = false, selectedBuilding = null;
        let startX, startY;

        const bgMusic = document.getElementById('bg-music');
        const playlist = [
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/zdwyzfcv/04.%20Home%20Music%20Part%201.mp3",
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/afzirkav/06.%20Home%20Music%20Part%203.mp3"
        ];

        // --- INITIALIZE ---
        window.onload = () => {
            initGrid();
            loadGame(); // Load from Firebase
            setupEvents();
        };

        function initGrid() {
            const grid = document.getElementById('grid-layer');
            const grassImgs = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
            for (let i = 0; i < 1600; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.style.backgroundImage = `url('${grassImgs[Math.floor(Math.random()*5)]}')`;
                tile.onclick = () => handleTileClick(i);
                grid.appendChild(tile);
            }
            updateMapPosition();
        }

        function handleTileClick(id) {
            if (isDragging) return;
            if (selectedBuilding) {
                spawnBuilding(id, selectedBuilding, false, true);
                selectedBuilding = null;
            }
        }

        function spawnBuilding(tileId, type, isTH = false, shouldSave = false) {
            const tile = document.getElementById(`tile-${tileId}`);
            if (!tile || tile.querySelector('.building')) return;

            const b = document.createElement('div');
            b.className = 'building' + (isTH ? ' size-4x4' : '');
            b.style.backgroundImage = `url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/${type}.png?raw=true')`;
            tile.appendChild(b);

            if (type.includes('gold') || type.includes('elixir')) {
                setupCollector(tile, type);
            }

            if (shouldSave) {
                buildingsData.push({ tileId, type, isTH });
                saveGame();
            }
        }

        function setupCollector(tile, type) {
            const resType = type.includes('gold') ? 'gold' : 'elixir';
            const icon = resType === 'gold' ? 'coin' : 'elixir';
            setInterval(() => {
                if (!tile.querySelector('.collect-bubble')) {
                    const bubble = document.createElement('div');
                    bubble.className = 'collect-bubble';
                    bubble.innerHTML = `<img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/${icon}.png?raw=true">`;
                    bubble.onclick = (e) => {
                        e.stopPropagation();
                        resources[resType] += 50;
                        updateUI();
                        saveGame();
                        bubble.remove();
                    };
                    tile.appendChild(bubble);
                }
            }, 15000);
        }

        // --- FIREBASE DATA ---
        function saveGame() {
            set(ref(db, 'users/player1'), {
                resources: resources,
                buildings: buildingsData
            });
        }

        function loadGame() {
            onValue(ref(db, 'users/player1'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    resources = data.resources;
                    updateUI();
                    if (data.buildings) {
                        data.buildings.forEach(b => spawnBuilding(b.tileId, b.type, b.isTH, false));
                        buildingsData = data.buildings;
                    }
                } else {
                    // Default starters if no save found
                    spawnBuilding(820, 'townhall1', true, true);
                }
            }, { onlyOnce: true });
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = resources.gold;
            document.getElementById('elixir-val').innerText = resources.elixir;
            document.getElementById('gem-val').innerText = resources.gems;
        }

        // --- CAMERA & UI EVENTS ---
        function setupEvents() {
            const overlay = document.getElementById('intro-overlay');
            overlay.onclick = () => {
                document.getElementById('intro-audio').play();
                setTimeout(() => {
                    document.getElementById('intro-0').classList.remove('active');
                    document.getElementById('intro-1').classList.add('active');
                    setTimeout(() => {
                        overlay.classList.add('hidden');
                        bgMusic.src = playlist[0];
                        bgMusic.play();
                    }, 2500);
                }, 2000);
            };

            document.getElementById('shop-trigger').onclick = () => toggleShop(true);
            document.getElementById('close-shop').onclick = () => toggleShop(false);
            
            document.querySelectorAll('.shop-item').forEach(item => {
                item.onclick = () => {
                    selectedBuilding = item.dataset.type;
                    toggleShop(false);
                };
            });
        }

        function toggleShop(s) { document.getElementById('shop-layer').style.display = s ? 'flex' : 'none'; }
        
        function updateMapPosition() {
            const map = document.getElementById('map-container');
            map.style.left = mapX + "px"; map.style.top = mapY + "px";
        }

        window.onmousedown = (e) => {
            if (e.target.closest('#shop-layer') || e.target.closest('#resource-bar')) return;
            isMouseDown = true; isDragging = false;
            startX = e.clientX - mapX; startY = e.clientY - mapY;
        };
        window.onmousemove = (e) => {
            if (!isMouseDown) return;
            isDragging = true;
            mapX = e.clientX - startX; mapY = e.clientY - startY;
            updateMapPosition();
        };
        window.onmouseup = () => isMouseDown = false;
    </script>
</body>
</html>
