<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        /* --- CORE SETUP --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #000;
        }

        /* Fixed Background - This stays behind everything */
        #world-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/background/background.png?raw=true');
            background-size: cover;
            background-position: center;
            z-index: -1; /* Puts it behind the map */
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- GAME WORLD --- */
        #game-viewport {
            width: 100vw; height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        #game-viewport:active { cursor: grabbing; }

        #map-container {
            position: absolute;
            width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            background: transparent;
            /* Start position handles by JS */
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(40, 1fr); 
            grid-template-rows: repeat(40, 1fr);
        }

        .tile {
            width: 100%; height: 100%;
            background-size: cover;
            box-sizing: border-box;
            margin: -0.2px; 
        }

        /* --- UI --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 10; }
        .shop-btn { width: 120px; cursor: pointer; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); transition: transform 0.1s; }
        .shop-btn:active { transform: scale(0.9); }

        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 100;
            justify-content: center; align-items: center;
        }
        .shop-container {
            width: 95vw; height: 90vh; background: #d3d7c6; border: 4px solid #1a1a1a;
            border-radius: 12px; display: flex; flex-direction: column; position: relative;
        }
        .close-btn { position: absolute; top: 5px; right: 10px; background: #ff3131; border: 3px solid #000; border-radius: 5px; padding: 5px 12px; cursor: pointer; color: white; }
    </style>
</head>
<body onload="startIntroSequence()">

    <div id="world-bg"></div>

    <div id="intro-overlay">
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
    </div>

    <audio id="intro-audio" preload="auto">
        <source src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/main/audio/coc-intro.mp3" type="audio/mpeg">
    </audio>
    <audio id="bg-music" preload="auto"></audio>

    <div id="game-viewport">
        <div id="map-container">
            <div id="grid-layer" class="grid-layer"></div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" class="shop-btn" onclick="toggleShop(true)">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <div class="close-btn" onclick="toggleShop(false)">X</div>
            <p style="text-align:center; color:black; font-size: 30px;">SHOP</p>
        </div>
    </div>

    <script>
        // --- GRID GENERATION ---
        const gridSize = 40; 
        const totalTiles = gridSize * gridSize;
        const gridLayer = document.getElementById('grid-layer');
        const images = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
        
        let tilePool = [];
        for (let i = 0; i < totalTiles; i++) tilePool.push(images[i % images.length]);

        for (let i = tilePool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [tilePool[i], tilePool[j]] = [tilePool[j], tilePool[i]];
        }

        const placedTiles = [];
        for (let i = 0; i < totalTiles; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const leftN = (i % gridSize !== 0) ? placedTiles[i - 1] : null;
            const topN = (i >= gridSize) ? placedTiles[i - gridSize] : null;

            let foundIdx = 0;
            for (let j = 0; j < tilePool.length; j++) {
                if (tilePool[j] !== leftN && tilePool[j] !== topN) {
                    foundIdx = j; break;
                }
            }

            const selectedImg = tilePool[foundIdx];
            tile.style.backgroundImage = `url('${selectedImg}')`;
            placedTiles.push(selectedImg);
            tilePool.splice(foundIdx, 1);
            gridLayer.appendChild(tile);
        }

        // --- CAMERA PANNING ---
        const viewport = document.getElementById('game-viewport');
        const map = document.getElementById('map-container');
        let isDragging = false;
        let startX, startY;
        
        // Center the map based on screen size
        let mapX = (window.innerWidth / 2) - 1200;
        let mapY = (window.innerHeight / 2) - 800; 

        map.style.left = mapX + "px";
        map.style.top = mapY + "px";

        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - mapX;
            startY = e.clientY - mapY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            mapX = e.clientX - startX;
            mapY = e.clientY - startY;
            map.style.left = mapX + "px";
            map.style.top = mapY + "px";
        });

        // --- INTRO & MUSIC ---
        const playlist = [
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/zdwyzfcv/04.%20Home%20Music%20Part%201.mp3",
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/afzirkav/06.%20Home%20Music%20Part%203.mp3"
        ];
        let currentTrack = 0;
        const bgMusic = document.getElementById('bg-music');

        function startIntroSequence() {
            document.getElementById('intro-audio').play().catch(e => {});
            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => {
                    document.getElementById('intro-overlay').classList.add('hidden');
                    bgMusic.src = playlist[0];
                    bgMusic.play().catch(e => {});
                }, 3000);
            }, 2000);
        }

        function toggleShop(show) { document.getElementById('shop-layer').style.display = show ? 'flex' : 'none'; }
    </script>
</body>
</html>
