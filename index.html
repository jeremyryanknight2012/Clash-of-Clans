<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #051a02;
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- GAME VIEWPORT --- */
        #game-viewport {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            touch-action: none;
        }

        /* Giant World Surface */
        #world-surface {
            position: absolute;
            width: 8000px; height: 8000px;
            will-change: transform;
        }

        /* --- BACKGROUND LAYERING BY SCALE --- */
        #forest-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Huge background2.png tiles */
            grid-template-rows: repeat(4, 1fr);
            z-index: 1;
        }

        .bg-forest { 
            width: 100%; height: 100%; 
            background-size: cover;
            filter: brightness(0.9);
        }

        /* Dirt Path Border - Slightly bigger than grass tiles */
        #path-border {
            position: absolute;
            width: 3000px; height: 3000px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            display: grid;
            grid-template-columns: repeat(20, 1fr); /* background.png tiles */
            z-index: 2;
        }

        .bg-path { width: 100%; height: 100%; background-size: cover; }

        /* --- CENTRAL VILLAGE GRID --- */
        #map-container {
            position: absolute;
            width: 2400px; height: 2400px; 
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            z-index: 5;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(40, 1fr); /* Tiny grass/background1.png tiles */
        }

        .tile { width: 100%; height: 100%; background-size: cover; margin: -0.1px; }
        .tile:hover { filter: brightness(1.4); cursor: pointer; }

        /* UI */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .shop-btn { width: 120px; cursor: pointer; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); }
    </style>
</head>
<body onload="startIntroSequence()">

    <div id="intro-overlay">
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
    </div>

    <div id="game-viewport">
        <div id="world-surface">
            <div id="forest-layer"></div>
            
            <div id="path-border"></div>

            <div id="map-container">
                <div id="grid-layer" class="grid-layer"></div>
            </div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" class="shop-btn">
    </div>

    <script>
        const rawBase = 'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/';

        // 1. Generate Huge Forest (background2.png)
        const forestLayer = document.getElementById('forest-layer');
        for (let i = 0; i < 16; i++) {
            const t = document.createElement('div');
            t.className = 'bg-forest';
            t.style.backgroundImage = `url('${rawBase}background/background2.png?raw=true')`;
            forestLayer.appendChild(t);
        }

        // 2. Generate Dirt Path Border (background.png)
        const pathBorder = document.getElementById('path-border');
        for (let i = 0; i < 400; i++) {
            const t = document.createElement('div');
            t.className = 'bg-path';
            t.style.backgroundImage = `url('${rawBase}background/background.png?raw=true')`;
            pathBorder.appendChild(t);
        }

        // 3. Generate Small Village Tiles (Grass + background1.png filler)
        const gridLayer = document.getElementById('grid-layer');
        const smallAssets = ['grid/grass.png', 'background/background1.png'];
        for (let i = 0; i < 1600; i++) {
            const t = document.createElement('div');
            t.className = 'tile';
            const img = smallAssets[Math.random() > 0.9 ? 1 : 0]; // Mostly grass, some background1 filler
            t.style.backgroundImage = `url('${rawBase}${img}${img.includes('grass') ? '' : '?raw=true'}')`;
            gridLayer.appendChild(t);
        }

        // --- CAMERA PANNING ---
        const world = document.getElementById('world-surface');
        let isPanning = false;
        let startX, startY;
        let currentX = (window.innerWidth / 2) - 4000;
        let currentY = (window.innerHeight / 2) - 4000;

        world.style.left = currentX + "px";
        world.style.top = currentY + "px";

        document.getElementById('game-viewport').addEventListener('mousedown', (e) => {
            isPanning = true;
            startX = e.clientX - currentX;
            startY = e.clientY - currentY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            world.style.left = currentX + "px";
            world.style.top = currentY + "px";
        });

        window.addEventListener('mouseup', () => isPanning = false);

        function startIntroSequence() {
            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => {
                    document.getElementById('intro-overlay').classList.add('hidden');
                }, 2000);
            }, 2000);
        }
    </script>
</body>
</html>
