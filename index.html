<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #0e3d06;
        }

        #world-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/background/background.png?raw=true');
            background-size: cover; background-position: center;
            z-index: -1; 
        }

        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        #game-viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; touch-action: none; }

        #map-container {
            position: absolute; width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            will-change: transform, left, top;
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(40, 1fr); grid-template-rows: repeat(40, 1fr);
        }

        .tile {
            width: 100%; height: 100%; background-size: cover;
            margin: -0.2px; transition: filter 0.1s;
            position: relative; transform-style: preserve-3d;
        }

        .tile:hover { filter: brightness(1.3); cursor: pointer; outline: 1px solid rgba(255,255,255,0.3); }

        /* --- BUILDING STYLE --- */
        .building {
            position: absolute;
            bottom: 10%; left: 50%;
            width: 150%; height: 150%; /* Buildings usually overlap tiles slightly */
            transform: translate(-50%, 0) rotateZ(45deg) rotateX(-60deg); /* Counter-rotate to stand upright */
            background-size: contain; background-repeat: no-repeat;
            background-position: bottom;
            pointer-events: none; /* Let clicks go through to the tile */
            z-index: 10;
        }

        /* --- UI & SHOP --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 10; }
        .shop-btn { width: 120px; cursor: pointer; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); transition: transform 0.1s; }
        
        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 100;
            justify-content: center; align-items: center;
        }
        .shop-container {
            width: 80vw; height: 60vh; background: #d3d7c6; border: 4px solid #1a1a1a;
            border-radius: 12px; display: flex; flex-direction: column; padding: 20px;
        }
        .shop-items { display: flex; gap: 20px; justify-content: center; margin-top: 50px; }
        .shop-item { 
            background: #aeb49a; border: 3px solid #444; padding: 10px; cursor: pointer;
            text-align: center; border-radius: 8px;
        }
        .shop-item:hover { background: #c5ccb1; }
        .shop-item img { width: 80px; height: 80px; object-fit: contain; }

        .close-btn { position: absolute; top: 10px; right: 10px; background: #ff3131; border: 2px solid #000; color: white; cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body onload="startIntroSequence()">

    <div id="world-bg"></div>

    <div id="intro-overlay">
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
    </div>

    <audio id="intro-audio" preload="auto">
        <source src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/main/audio/coc-intro.mp3" type="audio/mpeg">
    </audio>
    <audio id="bg-music" preload="auto"></audio>

    <div id="game-viewport">
        <div id="map-container">
            <div id="grid-layer" class="grid-layer"></div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" class="shop-btn" onclick="toggleShop(true)">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <div class="close-btn" onclick="toggleShop(false)">X</div>
            <h2 style="text-align:center; color: #333;">BUILDINGS</h2>
            <div class="shop-items">
                <div class="shop-item" onclick="selectBuilding('townhall')">
                    <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/townhall.png?raw=true">
                    <p>Town Hall</p>
                </div>
                </div>
        </div>
    </div>

    <script>
        const gridSize = 40; 
        const gridLayer = document.getElementById('grid-layer');
        let selectedBuildingToPlace = null; // Stores what we are currently building

        // --- GRID GENERATION ---
        const grassImgs = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
        for (let i = 0; i < gridSize * gridSize; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.dataset.id = i;
            tile.style.backgroundImage = `url('${grassImgs[Math.floor(Math.random() * grassImgs.length)]}')`;
            
            tile.onclick = (e) => {
                if (isActuallyDragging) return;
                
                // If we have a building selected from shop, place it!
                if (selectedBuildingToPlace) {
                    placeBuilding(tile, selectedBuildingToPlace);
                    selectedBuildingToPlace = null; // Reset selection
                }
            };
            gridLayer.appendChild(tile);
        }

        function selectBuilding(type) {
            selectedBuildingToPlace = type;
            toggleShop(false);
            console.log("Placing mode: " + type + ". Click a tile!");
        }

        function placeBuilding(tile, type) {
            // Check if tile already has a building
            if (tile.querySelector('.building')) return;

            const b = document.createElement('div');
            b.className = 'building';
            // Path to your building image
            b.style.backgroundImage = `url('shop/${type}.png')`;
            tile.appendChild(b);
        }

        // --- CAMERA PANNING ---
        const map = document.getElementById('map-container');
        let isMouseDown = false, isActuallyDragging = false;
        let startX, startY;
        let mapX = (window.innerWidth / 2) - 1200, mapY = (window.innerHeight / 2) - 800;
        map.style.left = mapX + "px"; map.style.top = mapY + "px";

        document.getElementById('game-viewport').onmousedown = (e) => {
            isMouseDown = true; isActuallyDragging = false;
            startX = e.clientX - mapX; startY = e.clientY - mapY;
        };
        window.onmousemove = (e) => {
            if (!isMouseDown) return;
            isActuallyDragging = true;
            mapX = e.clientX - startX; mapY = e.clientY - startY;
            map.style.left = mapX + "px"; map.style.top = mapY + "px";
        };
        window.onmouseup = () => { isMouseDown = false; setTimeout(() => isActuallyDragging = false, 10); };

        // --- INTRO & SHOP ---
        function startIntroSequence() {
            document.getElementById('intro-audio').play().catch(e => {});
            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => {
                    document.getElementById('intro-overlay').classList.add('hidden');
                }, 3000);
            }, 2000);
        }
        function toggleShop(show) { document.getElementById('shop-layer').style.display = show ? 'flex' : 'none'; }
    </script>
</body>
</html>
