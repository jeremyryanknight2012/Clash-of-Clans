<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #0e3d06; 
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- GAME WORLD --- */
        #game-viewport {
            width: 100vw; height: 100vh;
            overflow: auto; /* Allows panning */
            background: #1b4d0a;
            display: block; /* Changed from flex to allow scrolling to work properly */
        }

        /* This wrapper ensures the scrollable area is huge so the map doesn't hit edges */
        #scroll-canvas {
            width: 5000px; 
            height: 5000px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #map-container {
            position: relative;
            width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            /* Removed negative margin - we handle positioning with the scroll-canvas now */
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(40, 1fr); 
            grid-template-rows: repeat(40, 1fr);
        }

        .tile {
            width: 100%; height: 100%;
            background-size: cover;
            box-sizing: border-box;
            margin: -0.2px; 
        }

        .tile:hover {
            filter: brightness(1.2);
            cursor: pointer;
        }

        /* --- PLACEMENT GHOST --- */
        #ghost-building {
            position: fixed;
            pointer-events: none;
            display: none;
            width: 100px;
            height: 100px;
            z-index: 50;
            transform: translate(-50%, -50%);
            opacity: 0.8;
        }

        /* --- UI ELEMENTS --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 10; }
        .shop-btn { 
            width: 120px; 
            cursor: pointer; 
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            transition: transform 0.1s; 
        }
        .shop-btn:active { transform: scale(0.9); }

        /* --- SHOP LAYER --- */
        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 100;
            justify-content: center; align-items: center;
        }
        .shop-container {
            width: 95vw; height: 90vh; background: #d3d7c6; border: 4px solid #1a1a1a;
            border-radius: 12px; display: flex; flex-direction: column; position: relative;
            color: white; text-shadow: 2px 2px 0px #000;
        }
        .close-btn { 
            position: absolute; top: 5px; right: 10px; background: #ff3131; 
            border: 3px solid #000; border-radius: 5px; padding: 5px 12px; 
            cursor: pointer; z-index: 101; 
        }
        .item-list-container { 
            flex-grow: 1; background-color: #3b2d38; margin: 10px; 
            border-radius: 8px; border: 3px solid #1a1a1a; overflow-x: auto; 
            display: flex; align-items: center; 
        }
        .grid-shop { 
            display: inline-grid; grid-template-rows: repeat(2, 1fr); 
            grid-auto-flow: column; gap: 8px; padding: 10px; height: calc(100% - 20px); 
        }
        .card { 
            width: 130px; height: 160px; background: #8e8e8e; 
            border: 3px solid #1a1a1a; border-radius: 10px; overflow: hidden; 
            position: relative; cursor: pointer;
        }
        .card:hover { filter: brightness(1.1); }
        .full-png-img { width: 100%; height: 100%; object-fit: fill; }
    </style>
</head>
<body onload="startIntroSequence()">

    <div id="intro-overlay">
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
    </div>

    <img id="ghost-building" src="" alt="Ghost">

    <audio id="intro-audio" preload="auto">
        <source src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/main/audio/coc-intro.mp3" type="audio/mpeg">
    </audio>
    <audio id="bg-music" preload="auto"></audio>

    <div id="game-viewport">
        <div id="scroll-canvas">
            <div id="map-container">
                <div id="grid-layer" class="grid-layer"></div>
            </div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" 
             class="shop-btn" onclick="toggleShop(true)" alt="Shop">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <div class="close-btn" onclick="toggleShop(false)">X</div>
            <div class="item-list-container">
                <div class="grid-shop">
                    <div class="card" onclick="selectBuilding('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/army-camp-no-build.png?raw=true')">
                        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/army-camp-no-build.png?raw=true" class="full-png-img">
                    </div>
                    <div class="card" onclick="selectBuilding('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/labratory-no-build.png?raw=true')">
                        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/labratory-no-build.png?raw=true" class="full-png-img">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- GRID GENERATION ---
        const gridSize = 40; 
        const totalTiles = gridSize * gridSize;
        const gridLayer = document.getElementById('grid-layer');
        const images = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
        
        let tilePool = [];
        for (let i = 0; i < totalTiles; i++) {
            tilePool.push(images[i % images.length]);
        }

        for (let i = tilePool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [tilePool[i], tilePool[j]] = [tilePool[j], tilePool[i]];
        }

        const placedTiles = [];
        for (let i = 0; i < totalTiles; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const leftN = (i % gridSize !== 0) ? placedTiles[i - 1] : null;
            const topN = (i >= gridSize) ? placedTiles[i - gridSize] : null;

            let foundIdx = 0;
            for (let j = 0; j < tilePool.length; j++) {
                if (tilePool[j] !== leftN && tilePool[j] !== topN) {
                    foundIdx = j;
                    break;
                }
            }

            const selectedImg = tilePool[foundIdx];
            tile.style.backgroundImage = `url('${selectedImg}')`;
            placedTiles.push(selectedImg);
            tilePool.splice(foundIdx, 1);
            gridLayer.appendChild(tile);
        }

        // Center the view on the map
        function centerMap() {
            const viewport = document.getElementById('game-viewport');
            const canvas = document.getElementById('scroll-canvas');
            viewport.scrollLeft = (canvas.offsetWidth - viewport.offsetWidth) / 2;
            viewport.scrollTop = (canvas.offsetHeight - viewport.offsetHeight) / 2;
        }

        // --- PLACEMENT LOGIC ---
        const ghost = document.getElementById('ghost-building');
        function selectBuilding(imgSrc) {
            ghost.src = imgSrc;
            ghost.style.display = 'block';
            toggleShop(false);
        }

        document.addEventListener('mousemove', (e) => {
            if (ghost.style.display === 'block') {
                ghost.style.left = e.clientX + 'px';
                ghost.style.top = e.clientY + 'px';
            }
        });

        document.addEventListener('mousedown', () => {
            if (ghost.style.display === 'block') {
                ghost.style.display = 'none';
            }
        });

        // --- MUSIC ---
        const playlist = [
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/zdwyzfcv/04.%20Home%20Music%20Part%201.mp3",
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/zdwyzfcv/04.%20Home%20Music%20Part%201.mp3",
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/afzirkav/06.%20Home%20Music%20Part%203.mp3"
        ];
        let currentTrack = 0;
        const bgMusic = document.getElementById('bg-music');

        function playNextTrack() {
            bgMusic.src = playlist[currentTrack];
            bgMusic.play().catch(e => {});
            currentTrack = (currentTrack + 1) % playlist.length;
        }
        bgMusic.onended = playNextTrack;

        // --- INTRO SEQUENCE ---
        function startIntroSequence() {
            const introAudio = document.getElementById('intro-audio');
            introAudio.play().catch(e => {});

            // Initialize position
            centerMap();

            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => {
                    document.getElementById('intro-overlay').classList.add('hidden');
                    playNextTrack();
                }, 3000);
            }, 2000);
        }

        function toggleShop(show) {
            document.getElementById('shop-layer').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
