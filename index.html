<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #051a02;
        }

        /* --- INTRO --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- THE WORLD --- */
        #game-viewport {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            touch-action: none;
            cursor: grab;
        }
        #game-viewport:active { cursor: grabbing; }

        #world-surface {
            position: absolute;
            width: 8000px; height: 8000px;
            pointer-events: none; /* Prevents background from stealing mouse focus */
        }

        /* Huge Forest (background2.png) */
        #forest-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }
        .bg-forest { width: 100%; height: 100%; background-size: cover; filter: brightness(0.8); }

        /* Dirt Path (background.png) - Now strictly BEHIND the grid */
        #path-border {
            position: absolute; width: 3200px; height: 3200px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            display: grid; grid-template-columns: repeat(20, 1fr);
        }
        .bg-path { width: 100%; height: 100%; background-size: cover; }

        /* Village Grid */
        #map-container {
            position: absolute; width: 2400px; height: 2400px; 
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            pointer-events: auto; /* Only the grid and viewport handle clicks */
        }
        .grid-layer {
            display: grid; grid-template-columns: repeat(40, 1fr); 
            width: 100%; height: 100%;
        }
        .tile { width: 100%; height: 100%; background-size: cover; margin: -0.1px; }
        .tile:hover { filter: brightness(1.3); }

        /* UI */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .shop-btn { width: 120px; cursor: pointer; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); }
    </style>
</head>
<body onload="initGame()">

    <div id="intro-overlay" onclick="startSequence()">
        <p id="click-prompt" style="color:white; z-index:10000;">CLICK TO START</p>
        <img id="intro-0" src="intro/intro.png" class="intro-img active">
        <img id="intro-1" src="intro/intro1.png" class="intro-img">
    </div>

    <audio id="intro-audio"><source src="audio/coc-intro.mp3" type="audio/mpeg"></audio>

    <div id="game-viewport">
        <div id="world-surface">
            <div id="forest-layer"></div>
            <div id="path-border"></div>
            <div id="map-container">
                <div id="grid-layer" class="grid-layer"></div>
            </div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="buttons/shop.png" class="shop-btn">
    </div>

    <script>
        function initGame() {
            // Setup Forest
            const forest = document.getElementById('forest-layer');
            for(let i=0; i<16; i++) {
                const d = document.createElement('div');
                d.className = 'bg-forest';
                d.style.backgroundImage = "url('background/background2.png')";
                forest.appendChild(d);
            }
            // Setup Path
            const path = document.getElementById('path-border');
            for(let i=0; i<400; i++) {
                const d = document.createElement('div');
                d.className = 'bg-path';
                d.style.backgroundImage = "url('background/background.png')";
                path.appendChild(d);
            }
            // Setup Village
            const grid = document.getElementById('grid-layer');
            const grass = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
            for(let i=0; i<1600; i++) {
                const t = document.createElement('div');
                t.className = 'tile';
                const img = Math.random() > 0.95 ? 'background/background1.png' : grass[Math.floor(Math.random()*grass.length)];
                t.style.backgroundImage = `url('${img}')`;
                grid.appendChild(t);
            }
        }

        // --- FIXED AUDIO & INTRO ---
        function startSequence() {
            document.getElementById('click-prompt').style.display = 'none';
            const audio = document.getElementById('intro-audio');
            audio.play().catch(e => console.log("Audio need click"));
            
            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => {
                    document.getElementById('intro-overlay').classList.add('hidden');
                }, 2000);
            }, 2000);
        }

        // --- STABLE PANNING ---
        const viewport = document.getElementById('game-viewport');
        const world = document.getElementById('world-surface');
        let isPanning = false;
        let startX, startY;
        let currentX = (window.innerWidth / 2) - 4000;
        let currentY = (window.innerHeight / 2) - 4000;

        world.style.left = currentX + "px";
        world.style.top = currentY + "px";

        viewport.addEventListener('mousedown', (e) => {
            isPanning = true;
            startX = e.clientX - currentX;
            startY = e.clientY - currentY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            world.style.left = currentX + "px";
            world.style.top = currentY + "px";
        });

        window.addEventListener('mouseup', () => isPanning = false);
    </script>
</body>
</html>
