<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #0e3d06;
        }

        #world-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('background/background.png');
            background-size: cover; background-position: center;
            z-index: -1; 
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- THE MAP --- */
        #game-viewport {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
        }

        #map-container {
            position: absolute;
            width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(40, 1fr); 
            grid-template-rows: repeat(40, 1fr);
        }

        .tile {
            width: 100%; height: 100%;
            background-size: cover;
            position: relative;
            transform-style: preserve-3d;
        }

        /* --- THE BUILDING --- */
        .building {
            position: absolute;
            bottom: 20%; 
            left: 50%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            /* Corrected Isometric Stand-up */
            transform: translate(-50%, 0) rotateZ(45deg) rotateX(-90deg);
            transform-origin: bottom center;
            pointer-events: auto;
            z-index: 100;
            filter: drop-shadow(5px 10px 5px rgba(0,0,0,0.4));
        }

        /* Size Variants */
        .size-4x4 { width: 400%; height: 600%; } 
        .size-3x3 { width: 300%; height: 450%; } /* Army Camp size */
        .size-2x2 { width: 200%; height: 300%; }

        /* --- UI --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .shop-btn { width: 120px; cursor: pointer; }

        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .shop-container { width: 80vw; height: 60vh; background: #d3d7c6; border: 4px solid #1a1a1a; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body onload="initVillage(); startIntro();">

    <div id="world-bg"></div>

    <div id="intro-overlay">
        <img id="intro-0" src="intro/intro.png" class="intro-img active">
        <img id="intro-1" src="intro/intro1.png" class="intro-img">
    </div>

    <audio id="intro-audio"><source src="audio/coc-intro.mp3" type="audio/mpeg"></audio>

    <div id="game-viewport">
        <div id="map-container">
            <div id="grid-layer" class="grid-layer"></div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="buttons/shop.png" class="shop-btn" onclick="toggleShop(true)">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <button onclick="toggleShop(false)">CLOSE</button>
            <h2 style="text-align:center; color:black;">SHOP</h2>
            <div style="display:flex; gap:20px; justify-content:center;">
                <div onclick="selectBuilding('army_camp')" style="cursor:pointer; color:black; text-align:center;">
                    <img src="shop/army_camp.png" width="80"><br>Army Camp
                </div>
            </div>
        </div>
    </div>

    <script>
        let isDragging = false;
        let selectedType = null;

        function initVillage() {
            const grid = document.getElementById('grid-layer');
            const grass = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
            
            for (let i = 0; i < 1600; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.style.backgroundImage = `url('${grass[Math.floor(Math.random()*grass.length)]}')`;
                
                tile.onclick = () => {
                    if (isDragging) return;
                    if (selectedType) {
                        spawnBuilding(i, selectedType, '3x3'); // Camps are 3x3
                        selectedType = null;
                    }
                };
                grid.appendChild(tile);
            }

            // --- SPAWN STARTING BUILDINGS ---
            spawnBuilding(820, 'townhall', '4x4', 1);
            spawnBuilding(738, 'builder_hut', '2x2');
            spawnBuilding(743, 'gold_mine', '2x2');
        }

        function spawnBuilding(tileId, type, sizeClass, level = null) {
            const tile = document.getElementById(`tile-${tileId}`);
            if (!tile || tile.querySelector('.building')) return;

            const b = document.createElement('div');
            b.className = `building size-${sizeClass}`;
            
            const img = (type === 'townhall') ? `${type}${level || 1}.png` : `${type}.png`;
            b.style.backgroundImage = `url('shop/${img}')`;

            b.onclick = (e) => {
                e.stopPropagation();
                if (type === 'townhall') upgradeTownHall(b, level || 1);
            };

            tile.appendChild(b);
        }

        function upgradeTownHall(el, currentLv) {
            if (currentLv >= 18) return;
            if (confirm("Upgrade Town Hall?")) {
                const newLv = currentLv + 1;
                el.style.backgroundImage = `url('shop/townhall${newLv}.png')`;
                el.onclick = (e) => { e.stopPropagation(); upgradeTownHall(el, newLv); };
            }
        }

        // --- CAMERA ---
        const map = document.getElementById('map-container');
        let mDown = false, startX, startY;
        let mapX = (window.innerWidth/2)-1200, mapY = (window.innerHeight/2)-800;
        map.style.left = mapX+"px"; map.style.top = mapY+"px";

        window.onmousedown = (e) => { mDown = true; isDragging = false; startX = e.clientX-mapX; startY = e.clientY-mapY; };
        window.onmousemove = (e) => { 
            if(!mDown) return; 
            isDragging = true; 
            mapX = e.clientX-startX; mapY = e.clientY-startY;
            map.style.left = mapX+"px"; map.style.top = mapY+"px";
        };
        window.onmouseup = () => mDown = false;

        function startIntro() {
            const audio = document.getElementById('intro-audio');
            // Browser might still require a click for audio, but we'll try auto-play
            audio.play().catch(() => {
                console.log("Autoplay blocked. Audio will start on first map click.");
                window.addEventListener('mousedown', () => audio.play(), {once: true});
            });
            
            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => document.getElementById('intro-overlay').classList.add('hidden'), 2000);
            }, 2000);
        }

        function toggleShop(s) { document.getElementById('shop-layer').style.display = s ? 'flex' : 'none'; }
        function selectBuilding(t) { selectedType = t; toggleShop(false); }
    </script>
</body>
</html>
