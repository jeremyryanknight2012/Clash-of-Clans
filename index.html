<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #000; user-select: none;
        }

        #world-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/background/background.png?raw=true');
            background-size: cover; background-position: center; z-index: -1; 
        }

        #resource-bar {
            position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; 
            gap: 8px; z-index: 1000; align-items: flex-end;
        }
        .res-item {
            background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 20px;
            display: flex; align-items: center; padding: 2px 15px; min-width: 160px; justify-content: space-between;
            color: white; font-size: 18px; text-shadow: 2px 2px #000;
        }
        .res-icon { width: 35px; height: 35px; margin-left: 10px; }

        /* --- THE INTRO (WAITING FOR FIRST INTERACTION) --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999; cursor: pointer;
        }
        #intro-overlay.hidden { display: none; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- MAP ENGINE --- */
        #game-viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #map-container {
            position: absolute; width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d;
        }
        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(40, 1fr); grid-template-rows: repeat(40, 1fr);
        }
        .tile { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

        .building {
            position: absolute; bottom: 10%; left: 50%; 
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            transform: translate(-50%, 0) rotateZ(45deg) rotateX(-90deg);
            transform-origin: bottom center; z-index: 10; pointer-events: none;
        }
        .size-1x1 { width: 100%; height: 150%; }
        .size-2x2 { width: 200%; height: 300%; }
        .size-3x3 { width: 300%; height: 450%; }
        .size-4x4 { width: 400%; height: 600%; }

        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .shop-btn { width: 120px; cursor: pointer; }
        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center;
        }
        .shop-container { 
            width: 90vw; height: 80vh; background: #d3d7c6; border: 4px solid #1a1a1a; 
            border-radius: 12px; position: relative; padding: 20px; overflow-y: auto;
        }
        .shop-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px; margin-top: 20px; justify-items: center;
        }
        .shop-item {
            cursor: pointer; text-align: center; color: black; background: rgba(255,255,255,0.3);
            padding: 10px; border-radius: 8px; border: 2px solid #000; width: 100px;
        }

        #save-status {
            position: fixed; bottom: 10px; left: 10px; color: rgba(255,255,255,0.5);
            font-size: 12px; z-index: 2000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="save-status">VILLAGE SYNCED</div>

    <div id="resource-bar">
        <div class="res-item"><span id="gold-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/coin.png?raw=true"></div>
        <div class="res-item"><span id="elixir-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/elixir.png?raw=true"></div>
        <div class="res-item"><span id="dark-elixir-val">0</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/dark_elixir.png?raw=true"></div>
        <div class="res-item"><span id="gem-val">500</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/gem.png?raw=true"></div>
    </div>

    <div id="intro-overlay">
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
    </div>

    <audio id="bg-music"></audio>
    <audio id="intro-audio"><source src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/main/audio/coc-intro.mp3" type="audio/mpeg"></audio>

    <div id="game-viewport">
        <div id="map-container">
            <div id="grid-layer" class="grid-layer"></div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" class="shop-btn" id="shop-trigger">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <button id="close-shop" style="float:right;">X</button>
            <h2 style="text-align:center; color:black;">SHOP</h2>
            <div class="shop-grid">
                <div class="shop-item" data-type="gold_mine"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/gold_mine.png?raw=true" width="60"><br>Gold Mine</div>
                <div class="shop-item" data-type="elixir_collector"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/elixir_collector.png?raw=true" width="60"><br>Elixir Coll.</div>
                <div class="shop-item" data-type="gold_storage"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/gold_storage.png?raw=true" width="60"><br>Gold Storage</div>
                <div class="shop-item" data-type="elixir_storage"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/elixir_storage.png?raw=true" width="60"><br>Elixir Storage</div>
                <div class="shop-item" data-type="barracks"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/barracks.png?raw=true" width="60"><br>Barracks</div>
                <div class="shop-item" data-type="cannon"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/cannon.png?raw=true" width="60"><br>Cannon</div>
                <div class="shop-item" data-type="archer_tower"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/archer_tower.png?raw=true" width="60"><br>Archer Tower</div>
                <div class="shop-item" data-type="builder_hut"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/builder_hut.png?raw=true" width="60"><br>Builder Hut</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtAQZBz45bfocaqj08uUXLfPL9vFScstc",
            authDomain: "clash-of-clans-4c664.firebaseapp.com",
            databaseURL: "https://clash-of-clans-4c664-default-rtdb.firebaseio.com",
            projectId: "clash-of-clans-4c664",
            storageBucket: "clash-of-clans-4c664.firebasestorage.app",
            messagingSenderId: "417308170977",
            appId: "1:417308170977:web:ef0cd85423f830f4ecb5a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let resources = { gold: 750, elixir: 750, dark: 0, gems: 500 };
        let buildingsData = []; 
        let mapX = (window.innerWidth/2)-1200, mapY = (window.innerHeight/2)-800;
        let isMouseDown = false, isDragging = false, selectedBuilding = null;
        let startX, startY;

        const bgMusic = document.getElementById('bg-music');
        const playlist = [
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/zdwyzfcv/04.%20Home%20Music%20Part%201.mp3",
            "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/afzirkav/06.%20Home%20Music%20Part%203.mp3"
        ];
        let currentTrack = 0;

        window.onload = () => {
            initGrid();
            loadGame(); 
            
            // First click on the black screen triggers everything
            document.getElementById('intro-overlay').addEventListener('click', function startGame() {
                this.removeEventListener('click', startGame);
                document.getElementById('intro-audio').play();
                startIntroSequence();
            }, { once: true });

            setInterval(() => saveGame("Autosave"), 30000);
            
            setInterval(() => {
                buildingsData.forEach(b => {
                    if (b.type === 'gold_mine') resources.gold += 1;
                    if (b.type === 'elixir_collector') resources.elixir += 1;
                });
                updateUI();
            }, 3000);
        };

        function startIntroSequence() {
            const intro0 = document.getElementById('intro-0');
            const intro1 = document.getElementById('intro-1');
            const overlay = document.getElementById('intro-overlay');

            intro0.style.display = 'block'; // Show first image immediately

            setTimeout(() => {
                intro0.classList.remove('active');
                intro0.style.display = 'none';
                intro1.classList.add('active');
                intro1.style.display = 'block';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    playNextTrack();
                }, 3000); 
            }, 3000);
        }

        function initGrid() {
            const grid = document.getElementById('grid-layer');
            const grassImgs = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
            for (let i = 0; i < 1600; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.style.backgroundImage = `url('${grassImgs[Math.floor(Math.random()*5)]}')`;
                tile.onclick = () => {
                    if (isDragging) return;
                    if (selectedBuilding) {
                        spawnBuilding(i, selectedBuilding, true);
                        selectedBuilding = null;
                    }
                };
                grid.appendChild(tile);
            }
            updateMapPosition();
        }

        function spawnBuilding(tileId, type, shouldSave = false) {
            const tile = document.getElementById(`tile-${tileId}`);
            if (!tile || tile.querySelector('.building')) return;

            let sizeClass = 'size-2x2';
            if (type === 'townhall1') sizeClass = 'size-4x4';
            if (type.includes('storage')) sizeClass = 'size-3x3';
            if (type === 'builder_hut') sizeClass = 'size-1x1';

            const b = document.createElement('div');
            b.className = `building ${sizeClass}`;
            b.style.backgroundImage = `url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/${type}.png?raw=true')`;
            tile.appendChild(b);

            if (shouldSave) {
                buildingsData.push({ tileId, type });
                saveGame("Placed " + type);
            }
        }

        function saveGame(reason) {
            set(ref(db, 'users/player1'), { resources, buildings: buildingsData });
            document.getElementById('save-status').innerText = `SYNCED: ${reason.toUpperCase()}`;
        }

        function loadGame() {
            onValue(ref(db, 'users/player1'), (snap) => {
                const d = snap.val();
                if (d) {
                    resources = d.resources;
                    updateUI();
                    if (d.buildings) {
                        document.querySelectorAll('.building').forEach(b => b.remove());
                        buildingsData = d.buildings;
                        d.buildings.forEach(b => spawnBuilding(b.tileId, b.type, false));
                    }
                } else {
                    spawnBuilding(820, 'townhall1', true);
                }
            }, { onlyOnce: true });
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = resources.gold;
            document.getElementById('elixir-val').innerText = resources.elixir;
            document.getElementById('gem-val').innerText = resources.gems;
            document.getElementById('dark-elixir-val').innerText = resources.dark;
        }

        function playNextTrack() {
            bgMusic.src = playlist[currentTrack];
            bgMusic.play().catch(() => {});
            currentTrack = (currentTrack + 1) % playlist.length;
        }

        bgMusic.onended = playNextTrack;

        document.getElementById('shop-trigger').onclick = () => document.getElementById('shop-layer').style.display = 'flex';
        document.getElementById('close-shop').onclick = () => document.getElementById('shop-layer').style.display = 'none';
        document.querySelectorAll('.shop-item').forEach(item => {
            item.onclick = () => {
                selectedBuilding = item.dataset.type;
                document.getElementById('shop-layer').style.display = 'none';
            };
        });

        function updateMapPosition() {
            const m = document.getElementById('map-container');
            m.style.left = mapX + "px"; m.style.top = mapY + "px";
        }

        window.onmousedown = (e) => {
            if (e.target.closest('#shop-layer') || e.target.closest('#resource-bar') || !document.getElementById('intro-overlay').classList.contains('hidden')) return;
            isMouseDown = true; isDragging = false;
            startX = e.clientX - mapX; startY = e.clientY - mapY;
        };
        window.onmousemove = (e) => {
            if (!isMouseDown) return;
            isDragging = true;
            mapX = e.clientX - startX; mapY = e.clientY - startY;
            updateMapPosition();
        };
        window.onmouseup = () => isMouseDown = false;
    </script>
</body>
</html>
