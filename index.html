<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #0e3d06; user-select: none;
        }

        #world-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/background/background.png?raw=true');
            background-size: cover; background-position: center; z-index: -1; 
        }

        /* --- UI LAYERS --- */
        #resource-bar {
            position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; 
            gap: 8px; z-index: 10000; align-items: flex-end;
        }
        .res-item {
            background: rgba(0,0,0,0.7); border: 2px solid #333; border-radius: 20px;
            display: flex; align-items: center; padding: 2px 15px; min-width: 160px; justify-content: space-between;
            color: white; font-size: 18px; text-shadow: 2px 2px #000;
        }
        .res-icon { width: 35px; height: 35px; margin-left: 10px; }

        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 20000; cursor: pointer;
        }
        #intro-overlay.hidden { display: none; visibility: hidden; pointer-events: none; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- MAP ENGINE --- */
        #game-viewport { 
            width: 100vw; height: 100vh; position: relative; 
            overflow: hidden; cursor: grab; z-index: 10;
        }
        #game-viewport:active { cursor: grabbing; }

        #map-container {
            position: absolute; width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d;
            pointer-events: none; /* Allows clicks to reach grid-layer */
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(40, 1fr); grid-template-rows: repeat(40, 1fr);
            pointer-events: auto; z-index: 20;
        }

        .tile { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d;
        }

        /* --- BUILDINGS --- */
        .building {
            position: absolute; bottom: 10%; left: 50%; 
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            transform: translate(-50%, 0) rotateZ(45deg) rotateX(-90deg);
            transform-origin: bottom center; z-index: 30; pointer-events: none;
        }
        .size-1x1 { width: 100%; height: 150%; }
        .size-2x2 { width: 200%; height: 300%; }
        .size-3x3 { width: 300%; height: 450%; }
        .size-4x4 { width: 400%; height: 600%; }

        .collect-bubble {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; background: white; border: 3px solid #333;
            border-radius: 50%; z-index: 100; cursor: pointer; pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- SHOP --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 15000; }
        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 30000; justify-content: center; align-items: center;
        }
        .shop-container { width: 85vw; height: 75vh; background: #d3d7c6; border: 5px solid #1a1a1a; padding: 20px; overflow-y: auto; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .shop-item { background: #fff3; padding: 10px; border: 2px solid #000; border-radius: 10px; text-align: center; cursor: pointer; color: #000; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
        <p style="color:white; position:absolute; bottom:15%; font-size: 24px;">CLICK TO ENTER VILLAGE</p>
    </div>

    <div id="resource-bar">
        <div class="res-item"><span id="gold-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/coin.png?raw=true"></div>
        <div class="res-item"><span id="elixir-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/elixir.png?raw=true"></div>
        <div class="res-item"><span id="dark-elixir-val">0</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/dark_elixir.png?raw=true"></div>
        <div class="res-item"><span id="gem-val">500</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/gem.png?raw=true"></div>
    </div>

    <div id="game-viewport">
        <div id="map-container">
            <div id="grid-layer" class="grid-layer"></div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" width="120" style="cursor:pointer;" onclick="document.getElementById('shop-layer').style.display='flex'">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <button onclick="document.getElementById('shop-layer').style.display='none'">CLOSE</button>
            <div class="shop-grid" id="shop-items-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtAQZBz45bfocaqj08uUXLfPL9vFScstc",
            authDomain: "clash-of-clans-4c664.firebaseapp.com",
            databaseURL: "https://clash-of-clans-4c664-default-rtdb.firebaseio.com",
            projectId: "clash-of-clans-4c664",
            storageBucket: "clash-of-clans-4c664.firebasestorage.app",
            messagingSenderId: "417308170977",
            appId: "1:417308170977:web:ef0cd85423f830f4ecb5a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let resources = { gold: 750, elixir: 750, dark: 0, gems: 500 };
        let buildingsData = [];
        let mapX = (window.innerWidth/2)-1200, mapY = (window.innerHeight/2)-800;
        let isMouseDown = false, isDragging = false, selectedType = null;
        let startX, startY;

        const types = ['gold_mine', 'elixir_collector', 'gold_storage', 'elixir_storage', 'barracks', 'cannon', 'builder_hut'];

        window.onload = () => {
            const grid = document.getElementById('grid-layer');
            for(let i=0; i<1600; i++){
                const t = document.createElement('div');
                t.className = 'tile';
                t.onclick = () => { if(!isDragging && selectedType) { spawn(i, selectedType, true); selectedType = null; } };
                grid.appendChild(t);
            }
            
            const shop = document.getElementById('shop-items-container');
            types.forEach(type => {
                const item = document.createElement('div');
                item.className = 'shop-item';
                item.innerHTML = `<img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/${type}.png?raw=true" width="60"><br>${type.replace('_',' ')}`;
                item.onclick = () => { selectedType = type; document.getElementById('shop-layer').style.display='none'; };
                shop.appendChild(item);
            });

            load();
            updateMap();

            document.getElementById('intro-overlay').onclick = function() { this.classList.add('hidden'); };
        };

        function spawn(id, type, save = false) {
            const tile = document.getElementById(`grid-layer`).children[id];
            if(!tile || tile.innerHTML !== "") return;

            let sz = 'size-2x2';
            if(type.includes('storage')) sz = 'size-3x3';
            if(type === 'builder_hut') sz = 'size-1x1';
            if(type === 'townhall1') sz = 'size-4x4';

            const b = document.createElement('div');
            b.className = `building ${sz}`;
            b.style.backgroundImage = `url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/${type}.png?raw=true')`;
            tile.appendChild(b);

            if(save) { buildingsData.push({id, type}); saveGame(); }
        }

        function saveGame() { set(ref(db, 'users/player1'), { resources, buildings: buildingsData }); }

        function load() {
            onValue(ref(db, 'users/player1'), (snap) => {
                const d = snap.val();
                if(d) {
                    resources = d.resources;
                    document.getElementById('gold-val').innerText = resources.gold;
                    if(d.buildings) {
                        document.querySelectorAll('.building').forEach(el => el.remove());
                        buildingsData = d.buildings;
                        d.buildings.forEach(b => spawn(b.id, b.type, false));
                    }
                } else { spawn(820, 'townhall1', true); }
            }, { onlyOnce: true });
        }

        function updateMap() { const m = document.getElementById('map-container'); m.style.left = mapX+"px"; m.style.top = mapY+"px"; }

        window.onmousedown = (e) => { 
            if(e.target.closest('#resource-bar') || e.target.closest('.bottom-right-ui')) return;
            isMouseDown = true; isDragging = false; startX = e.clientX - mapX; startY = e.clientY - mapY; 
        };
        window.onmousemove = (e) => { 
            if(!isMouseDown) return; isDragging = true; mapX = e.clientX - startX; mapY = e.clientY - startY; updateMap(); 
        };
        window.onmouseup = () => isMouseDown = false;
    </script>
</body>
</html>
