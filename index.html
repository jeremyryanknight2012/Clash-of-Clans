<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // 1. Load your assets here
            this.load.image('map', 'assets/grass_bg.png');
            this.load.image('cannon', 'assets/cannon.png');
        }

        function create() {
            // 2. Place things on the screen
            this.add.image(400, 300, 'map');
            
            // Create a building that can be clicked
            let cannon = this.add.sprite(400, 300, 'cannon').setInteractive();
            
            cannon.on('pointerdown', () => {
                console.log("You clicked the cannon!");
                // Here is where you would open your Shop UI
            });
        }

        function update() {
            // 3. This runs 60 times a second (for animations/input)
        }
    </script>
</body>
</html>
