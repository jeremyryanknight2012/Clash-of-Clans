<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #0e3d06;
            user-select: none;
        }

        #world-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('background/background.png');
            background-size: cover; background-position: center;
            z-index: -1; 
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
            transition: opacity 1s ease-out;
        }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- THE MAP --- */
        #game-viewport {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            cursor: default;
        }

        #map-container {
            position: absolute;
            width: 2400px; height: 2400px; 
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(40, 1fr); 
            grid-template-rows: repeat(40, 1fr);
        }

        .tile {
            width: 100%; height: 100%;
            background-size: cover;
            position: relative;
            transform-style: preserve-3d;
            pointer-events: auto;
        }

        /* --- THE BUILDING --- */
        .building {
            position: absolute;
            bottom: 15%; left: 50%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            transform: translate(-50%, 0) rotateZ(45deg) rotateX(-90deg);
            transform-origin: bottom center;
            z-index: 100;
            pointer-events: none; /* Let clicks go through to the tile */
            filter: drop-shadow(5px 10px 5px rgba(0,0,0,0.4));
        }

        .size-4x4 { width: 400%; height: 600%; } 
        .size-3x3 { width: 300%; height: 450%; } 
        .size-2x2 { width: 200%; height: 300%; }

        /* --- UI --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .shop-btn { width: 120px; cursor: pointer; }

        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .shop-container { width: 80vw; height: 60vh; background: #d3d7c6; border: 4px solid #1a1a1a; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body onload="initVillage(); startIntro();">

    <div id="world-bg"></div>

    <div id="intro-overlay">
        <img id="intro-0" src="intro/intro.png" class="intro-img active">
        <img id="intro-1" src="intro/intro1.png" class="intro-img">
    </div>

    <audio id="music-player"></audio>

    <div id="game-viewport">
        <div id="map-container">
            <div id="grid-layer" class="grid-layer"></div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="buttons/shop.png" class="shop-btn" onclick="toggleShop(true)">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <button style="float:right;" onclick="toggleShop(false)">CLOSE</button>
            <h2 style="text-align:center; color:black;">SHOP</h2>
            <div style="display:flex; gap:20px; justify-content:center; margin-top:50px;">
                <div onclick="selectBuilding('army_camp')" style="cursor:pointer; color:black; text-align:center;">
                    <img src="shop/army_camp.png" width="80"><br>Army Camp
                </div>
            </div>
        </div>
    </div>

    <script>
        let isDragging = false;
        let selectedType = null;
        let mDown = false;
        let startX, startY;
        let mapX = (window.innerWidth/2)-1200;
        let mapY = (window.innerHeight/2)-800;
        
        // --- MUSIC PLAYLIST ---
        const playlist = ['audio/coc-intro.mp3', 'audio/game1.mp3', 'audio/game2.mp3'];
        let currentTrack = 0;
        const audio = document.getElementById('music-player');

        audio.onended = () => {
            currentTrack = (currentTrack + 1) % playlist.length;
            playTrack(currentTrack);
        };

        function playTrack(index) {
            audio.src = playlist[index];
            audio.play().catch(e => console.log("Audio waiting for user interaction"));
        }

        // --- GRID & BUILDING ---
        function initVillage() {
            const grid = document.getElementById('grid-layer');
            const grass = ['grid/grass.png', 'grid/grass1.png', 'grid/grass2.png', 'grid/grass3.png', 'grid/grass4.png'];
            
            for (let i = 0; i < 1600; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.dataset.index = i;
                tile.style.backgroundImage = `url('${grass[Math.floor(Math.random()*grass.length)]}')`;
                grid.appendChild(tile);
            }

            // Centralized click listener
            window.addEventListener('click', (e) => {
                if (isDragging) return;
                const tile = e.target.closest('.tile');
                if (tile && selectedType) {
                    spawnBuilding(tile.dataset.index, selectedType, '3x3');
                    selectedType = null;
                    document.body.style.cursor = 'default';
                }
            });

            spawnBuilding(820, 'townhall', '4x4', 1);
            spawnBuilding(738, 'builder_hut', '2x2');
            spawnBuilding(743, 'gold_mine', '2x2');
        }

        function spawnBuilding(tileId, type, sizeClass, level = null) {
            const tile = document.getElementById(`tile-${tileId}`);
            if (!tile || tile.querySelector('.building')) return;

            const b = document.createElement('div');
            b.className = `building size-${sizeClass}`;
            const img = (type === 'townhall') ? `${type}${level || 1}.png` : `${type}.png`;
            b.style.backgroundImage = `url('shop/${img}')`;
            tile.appendChild(b);
        }

        // --- CAMERA PANNING ---
        const map = document.getElementById('map-container');
        map.style.left = mapX + "px"; map.style.top = mapY + "px";

        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('#map-container')) {
                mDown = true; isDragging = false;
                startX = e.clientX - mapX; startY = e.clientY - mapY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!mDown) return;
            let moveX = e.clientX - startX;
            let moveY = e.clientY - startY;
            if (Math.abs(moveX - mapX) > 5) isDragging = true;
            mapX = moveX; mapY = moveY;
            map.style.left = mapX + "px"; map.style.top = mapY + "px";
        });

        window.addEventListener('mouseup', () => mDown = false);

        // --- INTRO SEQUENCE ---
        function startIntro() {
            playTrack(0);
            const overlay = document.getElementById('intro-overlay');
            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 1000); // Fully delete the blocker
                }, 2000);
            }, 2000);
        }

        function toggleShop(s) { document.getElementById('shop-layer').style.display = s ? 'flex' : 'none'; }
        function selectBuilding(t) { 
            selectedType = t; 
            toggleShop(false); 
            document.body.style.cursor = 'crosshair';
        }
    </script>
</body>
</html>
