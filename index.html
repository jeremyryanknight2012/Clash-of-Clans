<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Remake</title>
    <style>
        body { 
            margin: 0; 
            background: black; 
            overflow: hidden; 
        }

        /* The only visible element on the screen */
        #shop-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.1s;
        }

        #shop-button:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <img id="shop-button" src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/refs/heads/main/images/shop-button.png" alt="Shop">

</body>
</html>
