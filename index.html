<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Remake</title>
    <style>
        body { 
            margin: 0; 
            background: black; 
            overflow: hidden; 
        }

        /* Positioned in the bottom right as requested */
        #shop-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px; /* Adjusted size for the new asset */
            cursor: pointer;
            z-index: 100;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        #shop-button:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <a href="shop/shop.html">
        <img id="shop-button" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" alt="Shop">
    </a>

</body>
</html>
