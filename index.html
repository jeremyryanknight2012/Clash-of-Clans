<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Luckiest Guy', cursive;
            background-color: #000;
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
        }

        #intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        .supercell-logo {
            width: 300px;
            display: none; /* Hidden until click */
        }

        .start-text {
            color: #000;
            font-size: 24px;
            margin-top: 20px;
        }

        /* --- GAME WORLD --- */
        #game-canvas {
            width: 100vw;
            height: 100vh;
            background: #4a7a2a; /* Your Grass Map */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bottom-right-ui {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }

        .shop-btn { width: 100px; cursor: pointer; }

        /* --- SHOP LAYER --- */
        #shop-layer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .shop-container {
            width: 95vw;
            height: 90vh;
            background: #d3d7c6; 
            border: 4px solid #1a1a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            color: white;
            text-shadow: 2px 2px 0px #000;
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #ff3131;
            border: 3px solid #000;
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
        }

        .item-list-container { flex-grow: 1; background-color: #3b2d38; margin: 10px; border-radius: 8px; border: 3px solid #1a1a1a; overflow-x: auto; display: flex; align-items: center; }
        .grid { display: inline-grid; grid-template-rows: repeat(2, 1fr); grid-auto-flow: column; gap: 8px; padding: 10px; height: calc(100% - 20px); }
        .card { width: 130px; height: 160px; background: #8e8e8e; border: 3px solid #1a1a1a; border-radius: 10px; overflow: hidden; position: relative; }
        .full-png-img { width: 100%; height: 100%; object-fit: fill; }
        .building-img { width: 75px; height: 75px; margin-top: 8px; object-fit: contain; }
        .price-bar { width: 100%; background: rgba(0,0,0,0.4); position: absolute; bottom: 0; height: 35px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="startSequence()">
        <img id="logo" src="images/supercell_logo.png" class="supercell-logo" alt="SUPERCELL">
        <div id="click-to-start" class="start-text">TAP TO START</div>
    </div>

    <audio id="intro-audio" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/audio/coc-intro.mp3?raw=true"></audio>

    <div id="game-canvas">
        <h1>Village Map</h1>
        <div class="bottom-right-ui">
            <img src="buttons/shop_btn.png" class="shop-btn" onclick="toggleShop(true)">
        </div>
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <div class="close-btn" onclick="toggleShop(false)">X</div>
            <div class="item-list-container">
                <div class="grid">
                    <div class="card"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/army-camp-no-build.png?raw=true" class="full-png-img"></div>
                    <div class="card"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/labratory-no-build.png?raw=true" class="full-png-img"></div>
                    <div class="card"><div style="text-align:center">Barracks</div><img src="images/barracks.png" class="building-img"><div class="price-bar">100 💧</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startSequence() {
            const overlay = document.getElementById('intro-overlay');
            const logo = document.getElementById('logo');
            const clickText = document.getElementById('click-to-start');
            const audio = document.getElementById('intro-audio');

            // 1. Hide "Tap to start" and show Logo
            clickText.style.display = 'none';
            logo.style.display = 'block';

            // 2. Play the Sound
            audio.play().catch(error => console.log("Audio failed:", error));

            // 3. Wait for the intro to finish (approx 3.5 seconds) then fade out
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 3500);
        }

        function toggleShop(show) {
            document.getElementById('shop-layer').style.display = show ? 'flex' : 'none';
        }
    </script>

</body>
</html>
