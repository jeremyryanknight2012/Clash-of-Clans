<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            background-color: #051a02; user-select: none;
        }

        /* --- UI --- */
        #resource-bar {
            position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; 
            gap: 8px; z-index: 1000; align-items: flex-end;
        }
        .res-item {
            background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 20px;
            display: flex; align-items: center; padding: 2px 15px; min-width: 160px; justify-content: space-between;
            color: white; font-size: 18px; text-shadow: 2px 2px #000;
        }
        .res-icon { width: 35px; height: 35px; margin-left: 10px; }

        /* --- INTRO --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }

        /* --- GAME ENGINE --- */
        #game-viewport { 
            width: 100vw; height: 100vh; 
            position: relative; overflow: hidden; 
            cursor: default; /* Regular cursor by default */
        }
        
        #world-surface {
            position: absolute; 
            width: 4000px; height: 4000px;
            will-change: transform;
        }

        #map-container {
            position: absolute; width: 2400px; height: 2400px; 
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
        }

        .grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(40, 1fr); grid-template-rows: repeat(40, 1fr);
        }

        .tile { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d; background-size: cover; 
            cursor: pointer; /* Finger pointer for tiles */
        }
        .tile:hover { filter: brightness(1.2); }

        /* --- BUILDINGS --- */
        .building-wrapper {
            position: absolute; bottom: 15%; left: 50%; 
            transform: translate(-50%, 0) rotateZ(45deg) rotateX(-90deg);
            transform-origin: bottom center; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
        }
        .building-img {
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            width: 100%; height: 100%;
        }
        .collect-bubble {
            background: rgba(255,255,0,0.9); color: black; padding: 2px 8px;
            border-radius: 10px; font-size: 14px; margin-bottom: 5px;
            border: 2px solid #000; pointer-events: none; display: none;
        }

        .size-1x1 { width: 40px; height: 60px; }
        .size-2x2 { width: 80px; height: 120px; }
        .size-4x4 { width: 160px; height: 240px; }

        /* --- UI BUTTONS --- */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .shop-btn { width: 120px; cursor: pointer; }
        #shop-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center;
        }
        .shop-container { width: 90vw; height: 80vh; background: #d3d7c6; border: 4px solid #1a1a1a; border-radius: 12px; padding: 20px; overflow-y: auto; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; margin-top: 20px; justify-items: center; }
        .shop-item { cursor: pointer; text-align: center; color: black; background: rgba(255,255,255,0.3); padding: 10px; border-radius: 8px; border: 2px solid #000; width: 100px; }
    </style>
</head>
<body>

    <div id="resource-bar">
        <div class="res-item"><span id="gold-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/coin.png?raw=true"></div>
        <div class="res-item"><span id="elixir-val">750</span> <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/elixir.png?raw=true"></div>
    </div>

    <div id="intro-overlay" onclick="startIntro()">
        <p id="click-prompt" style="color:white; position:absolute; bottom:20%;">CLICK TO START</p>
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img">
    </div>

    <audio id="intro-audio" preload="auto"><source src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/main/audio/coc-intro.mp3" type="audio/mpeg"></audio>
    <audio id="bg-music" loop></audio>

    <div id="game-viewport">
        <div id="world-surface">
            <div id="map-container">
                <div id="grid-layer" class="grid-layer"></div>
            </div>
        </div>
    </div>

    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true" class="shop-btn" id="shop-trigger">
    </div>

    <div id="shop-layer">
        <div class="shop-container">
            <button id="close-shop" style="float:right; cursor:pointer;">X</button>
            <h2 style="text-align:center; color:black;">SHOP</h2>
            <div class="shop-grid">
                <div class="shop-item" data-type="gold_mine"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/gold_mine.png?raw=true" width="60"><br>Gold Mine</div>
                <div class="shop-item" data-type="elixir_collector"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/elixir_collector.png?raw=true" width="60"><br>Elixir Coll.</div>
                <div class="shop-item" data-type="townhall1"><img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/townhall1.png?raw=true" width="60"><br>Town Hall</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtAQZBz45bfocaqj08uUXLfPL9vFScstc",
            authDomain: "clash-of-clans-4c664.firebaseapp.com",
            databaseURL: "https://clash-of-clans-4c664-default-rtdb.firebaseio.com",
            projectId: "clash-of-clans-4c664",
            storageBucket: "clash-of-clans-4c664.firebasestorage.app",
            messagingSenderId: "417308170977",
            appId: "1:417308170977:web:ef0cd85423f830f4ecb5a0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let resources = { gold: 750, elixir: 750 };
        let buildingsData = []; 
        let selectedBuilding = null;

        const world = document.getElementById('world-surface');
        const viewport = document.getElementById('game-viewport');
        let isPanning = false;
        let panStartX, panStartY;
        let currentX = (window.innerWidth / 2) - 2000;
        let currentY = (window.innerHeight / 2) - 2000;
        let dragActive = false;

        // --- GRID ---
        function setupGrid() {
            const gridLayer = document.getElementById('grid-layer');
            const grass = [
                'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass.png?raw=true',
                'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass1.png?raw=true',
                'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass2.png?raw=true'
            ];
            
            for (let i = 0; i < 1600; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.style.backgroundImage = `url('${grass[i % 3]}')`;
                
                tile.onclick = (e) => {
                    if (dragActive) return;
                    if (selectedBuilding) {
                        spawnBuilding(i, selectedBuilding, true);
                        selectedBuilding = null;
                    }
                };
                gridLayer.appendChild(tile);
            }
            updateWorldPos();
        }

        // --- CAMERA ---
        viewport.onmousedown = (e) => {
            if(e.target.closest('.shop-btn') || e.target.closest('#shop-layer')) return;
            isPanning = true;
            dragActive = false;
            panStartX = e.clientX - currentX;
            panStartY = e.clientY - currentY;
        };

        window.onmousemove = (e) => {
            if (!isPanning) return;
            dragActive = true;
            currentX = e.clientX - panStartX;
            currentY = e.clientY - panStartY;
            updateWorldPos();
        };

        window.onmouseup = () => isPanning = false;

        function updateWorldPos() {
            world.style.left = currentX + "px";
            world.style.top = currentY + "px";
        }

        // --- BUILDING & COLLECTION ---
        function spawnBuilding(tileId, type, shouldSave = false) {
            const tile = document.getElementById(`tile-${tileId}`);
            if (!tile || tile.querySelector('.building-wrapper')) return;

            let size = (type === 'townhall1') ? 'size-4x4' : 'size-2x2';
            const wrapper = document.createElement('div');
            wrapper.className = `building-wrapper ${size}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'collect-bubble';
            wrapper.appendChild(bubble);

            const img = document.createElement('div');
            img.className = 'building-img';
            img.style.backgroundImage = `url('https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/${type}.png?raw=true')`;
            wrapper.appendChild(img);

            tile.appendChild(wrapper);

            wrapper.onclick = (e) => {
                e.stopPropagation();
                if(dragActive) return;
                collectResources(tileId);
            };

            if (shouldSave) {
                buildingsData.push({ tileId, type, stored: 0 });
                saveGame();
            }
        }

        function collectResources(tileId) {
            const b = buildingsData.find(item => item.tileId === tileId);
            if (!b || b.stored === 0) return;
            if (b.type === 'gold_mine') resources.gold += b.stored;
            if (b.type === 'elixir_collector') resources.elixir += b.stored;
            b.stored = 0;
            updateUI();
            updateBubbles();
            saveGame();
        }

        setInterval(() => {
            buildingsData.forEach(b => {
                if (b.type === 'gold_mine' || b.type === 'elixir_collector') b.stored += 1;
            });
            updateBubbles();
        }, 3000);

        function updateBubbles() {
            buildingsData.forEach(b => {
                const tile = document.getElementById(`tile-${b.tileId}`);
                const bubble = tile?.querySelector('.collect-bubble');
                if (bubble) {
                    bubble.innerText = b.stored;
                    bubble.style.display = b.stored > 0 ? 'block' : 'none';
                }
            });
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = resources.gold;
            document.getElementById('elixir-val').innerText = resources.elixir;
        }

        // --- DATA & SHOP ---
        function saveGame() { set(ref(db, 'users/player1'), { resources, buildings: buildingsData }); }

        function loadGame() {
            onValue(ref(db, 'users/player1'), (snap) => {
                const d = snap.val();
                if (d) {
                    resources = d.resources; updateUI();
                    if (d.buildings) {
                        buildingsData = d.buildings;
                        buildingsData.forEach(b => spawnBuilding(b.tileId, b.type, false));
                    }
                }
            }, { onlyOnce: true });
        }

        window.startIntro = () => {
            document.getElementById('click-prompt').style.display = 'none';
            document.getElementById('intro-audio').play();
            setTimeout(() => {
                document.getElementById('intro-0').classList.remove('active');
                document.getElementById('intro-1').classList.add('active');
                setTimeout(() => {
                    document.getElementById('intro-overlay').classList.add('hidden');
                    const bg = document.getElementById('bg-music');
                    bg.src = "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/zdwyzfcv/04.%20Home%20Music%20Part%201.mp3";
                    bg.play();
                }, 2500);
            }, 2500);
        };

        document.getElementById('shop-trigger').onclick = () => document.getElementById('shop-layer').style.display = 'flex';
        document.getElementById('close-shop').onclick = () => document.getElementById('shop-layer').style.display = 'none';
        document.querySelectorAll('.shop-item').forEach(item => {
            item.onclick = () => {
                selectedBuilding = item.dataset.type;
                document.getElementById('shop-layer').style.display = 'none';
            };
        });

        setupGrid();
        loadGame();
    </script>
</body>
</html>
