<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Luckiest Guy', cursive;
            background-color: #051a02;
            user-select: none;
        }

        /* ── RESOURCE BAR ── */
        #resource-bar {
            position: fixed; top: 10px; right: 10px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 1000; align-items: flex-end;
        }
        .res-item {
            background: rgba(0,0,0,0.65);
            border: 2px solid #555; border-radius: 20px;
            display: flex; align-items: center;
            padding: 4px 14px; min-width: 160px;
            justify-content: space-between;
            color: #fff; font-size: 18px;
            text-shadow: 2px 2px #000;
        }
        .res-icon { width: 32px; height: 32px; margin-left: 10px; }

        /* ── VIEWPORT / WORLD ── */
        #game-viewport {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            cursor: grab;
        }
        #game-viewport.grabbing { cursor: grabbing; }

        /* ── BUILDING OVERLAY LAYER ── */
        #building-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 20;
        }

        .building-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            transform: translate(-50%, -100%);
            cursor: pointer;
            background: transparent;
        }

        #world-surface {
            position: absolute;
            width: 5000px; height: 5000px;
            will-change: transform;
            /* NOTE: pointer-events must stay 'auto' so tiles are clickable */
        }

        /* ── ISOMETRIC MAP ── */
        #map-container {
            position: absolute;
            width: 2400px; height: 2400px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
        }

        #grid-layer {
            position: absolute; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(40, 1fr);
            grid-template-rows: repeat(40, 1fr);
        }

        .tile {
            width: 100%; height: 100%;
            position: relative;
            background-size: cover;
            cursor: pointer;
            transition: filter 0.1s;
        }
        .tile:hover { filter: brightness(1.25); }
        .tile.placing-mode:hover { filter: brightness(1.4) sepia(0.4) hue-rotate(60deg); }

        /* ── BUILDING OVERLAY LAYER ── */
        /* Buildings live here, NOT inside the isometric tiles */

        .building-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            transform: translate(-50%, -100%); /* anchor bottom-center to tile center */
            cursor: pointer;
        }

        /* The coin/elixir bubble that floats above the building */
        .collect-bubble {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-bottom: 4px;
            animation: bobble 1.5s ease-in-out infinite;
            pointer-events: none;
        }
        .collect-bubble.visible { display: flex; }
        .collect-bubble img {
            width: 40px; height: 40px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
        }
        /* small speech-bubble tail */
        .collect-bubble::after {
            content: '';
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid rgba(255,220,0,0.0); /* invisible — just spacing */
        }

        @keyframes bobble {
            0%,100% { transform: translateY(0px); }
            50%      { transform: translateY(-5px); }
        }

        .building-canvas {
            width: 100%; height: 100%;
            object-fit: contain;
            object-position: bottom center;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        /* Building sizes — these are the SCREEN-space pixel sizes */
        .size-1x1 { width: 52px;  height: 52px;  }
        .size-2x2 { width: 100px; height: 100px; }
        .size-3x3 { width: 140px; height: 140px; }
        .size-4x4 { width: 180px; height: 180px; }

        /* ── PLACEMENT CURSOR INDICATOR ── */
        #placement-cursor {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,200,0,0.9);
            color: #000; border: 2px solid #000;
            border-radius: 12px; padding: 6px 18px;
            font-size: 16px; z-index: 2000;
            display: none; pointer-events: none;
        }

        /* ── SHOP ── */
        .bottom-right-ui { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .shop-btn { width: 110px; cursor: pointer; filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.6)); transition: transform 0.1s; }
        .shop-btn:hover { transform: scale(1.05); }

        #shop-layer {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.82);
            z-index: 2000;
            justify-content: center; align-items: center;
        }
        #shop-layer.open { display: flex; }

        .shop-container {
            width: min(95vw, 760px);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #4a2e0a 0%, #2e1a04 100%);
            border: 4px solid #8b5e1a;
            border-radius: 16px;
            box-shadow: 0 0 0 2px #1a0a00, 0 12px 60px rgba(0,0,0,0.9),
                        inset 0 1px 0 rgba(255,200,80,0.2);
            overflow: hidden;
        }

        /* Wooden top bar */
        .shop-header {
            background: linear-gradient(180deg, #7a4a10 0%, #5a3008 100%);
            border-bottom: 3px solid #8b5e1a;
            padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .shop-title {
            font-size: 26px; color: #ffe099;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 12px rgba(255,180,0,0.4);
            letter-spacing: 2px;
        }
        .close-btn {
            background: linear-gradient(180deg, #c0392b, #922b21);
            color: #fff; border: 2px solid #7b241c;
            border-radius: 50%; width: 36px; height: 36px;
            font-size: 16px; cursor: pointer;
            font-family: 'Luckiest Guy', cursive;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        .close-btn:hover { transform: scale(1.1); background: linear-gradient(180deg, #e74c3c, #c0392b); }

        /* Category tabs */
        .shop-tabs {
            display: flex;
            background: #1a0a00;
            border-bottom: 2px solid #8b5e1a;
            flex-shrink: 0;
        }
        .shop-tab {
            flex: 1; padding: 10px 6px;
            text-align: center; cursor: pointer;
            font-size: 13px; color: #a07040;
            border-right: 1px solid #3a2000;
            transition: all 0.15s;
            text-shadow: 0 1px 2px #000;
        }
        .shop-tab:last-child { border-right: none; }
        .shop-tab:hover { background: rgba(255,180,0,0.08); color: #ffd070; }
        .shop-tab.active {
            background: linear-gradient(180deg, #5a3510 0%, #3a2008 100%);
            color: #ffe099;
            border-bottom: 2px solid #f0a030;
            margin-bottom: -2px;
        }

        /* Scrollable grid area */
        .shop-body {
            overflow-y: auto; padding: 16px;
            flex: 1;
        }
        .shop-body::-webkit-scrollbar { width: 6px; }
        .shop-body::-webkit-scrollbar-track { background: #1a0a00; }
        .shop-body::-webkit-scrollbar-thumb { background: #7a4a10; border-radius: 3px; }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .shop-item {
            cursor: pointer; text-align: center;
            background: linear-gradient(180deg, #5a3a10 0%, #3a2208 100%);
            border: 2px solid #7a5020;
            border-radius: 10px;
            padding: 10px 6px 8px;
            transition: transform 0.12s, border-color 0.12s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,200,80,0.1);
            position: relative;
            overflow: hidden;
        }
        .shop-item::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: rgba(255,200,80,0.2);
        }
        .shop-item:hover { transform: scale(1.04); border-color: #f0a030; }
        .shop-item:active { transform: scale(0.97); }

        .shop-item img {
            width: 72px; height: 72px;
            object-fit: contain; display: block; margin: 0 auto 6px;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6));
        }
        .shop-item-name {
            color: #ffe099; font-size: 12px;
            text-shadow: 0 1px 3px #000;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        .shop-item-cost {
            display: flex; align-items: center; justify-content: center;
            gap: 3px;
            background: rgba(0,0,0,0.35);
            border-radius: 20px; padding: 2px 8px;
            font-size: 13px;
        }
        .shop-item-cost img { width: 16px; height: 16px; margin: 0; filter: none; }
        .cost-gold { color: #ffd700; }
        .cost-elixir { color: #d966ff; }
        .cost-insufficient { color: #ff5555; }

        /* ── INTRO ── */
        #intro-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000; z-index: 9999; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        #intro-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.8s ease-out; }
        .intro-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }
        .intro-img.active { display: block; }
        #click-prompt {
            color: #fff; position: absolute; bottom: 20%;
            font-size: 22px; letter-spacing: 2px;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body>

    <!-- RESOURCE BAR -->
    <div id="resource-bar">
        <div class="res-item">
            <span id="gold-val">750</span>
            <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/coin.png?raw=true" alt="Gold">
        </div>
        <div class="res-item">
            <span id="elixir-val">750</span>
            <img class="res-icon" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/elixir.png?raw=true" alt="Elixir">
        </div>
    </div>

    <!-- INTRO -->
    <div id="intro-overlay" onclick="startIntro()">
        <p id="click-prompt">CLICK TO START</p>
        <img id="intro-0" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro.png?raw=true" class="intro-img active" alt="">
        <img id="intro-1" src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/intro/intro1.png?raw=true" class="intro-img" alt="">
    </div>

    <audio id="intro-audio" preload="auto">
        <source src="https://raw.githubusercontent.com/jeremyryanknight2012/Clash-of-Clans/main/audio/coc-intro.mp3" type="audio/mpeg">
    </audio>
    <audio id="bg-music" loop></audio>

    <!-- GAME WORLD -->
    <div id="game-viewport">
        <div id="world-surface">
            <div id="map-container">
                <div id="grid-layer" class="grid-layer"></div>
            </div>
        </div>
        <!-- BUILDING OVERLAY: screen-space, NOT inside the isometric transform -->
        <div id="building-layer"></div>
    </div>

    <!-- PLACEMENT HINT -->
    <div id="placement-cursor">📍 Click a tile to place building — ESC to cancel</div>

    <!-- SHOP BUTTON -->
    <div class="bottom-right-ui">
        <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/buttons/shop.png?raw=true"
             class="shop-btn" id="shop-trigger" alt="Shop">
    </div>

    <!-- SHOP OVERLAY -->
    <div id="shop-layer">
        <div class="shop-container">
            <div class="shop-header">
                <span class="shop-title">⚒ SHOP</span>
                <button class="close-btn" id="close-shop">✕</button>
            </div>
            <div class="shop-tabs">
                <div class="shop-tab active" data-cat="all">All</div>
                <div class="shop-tab" data-cat="resources">Resources</div>
                <div class="shop-tab" data-cat="defense">Defense</div>
                <div class="shop-tab" data-cat="army">Army</div>
            </div>
            <div class="shop-body">
                <div class="shop-grid" id="shop-items-container"></div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDtAQZBz45bfocaqj08uUXLfPL9vFScstc",
        authDomain: "clash-of-clans-4c664.firebaseapp.com",
        databaseURL: "https://clash-of-clans-4c664-default-rtdb.firebaseio.com",
        projectId: "clash-of-clans-4c664",
        storageBucket: "clash-of-clans-4c664.firebasestorage.app",
        messagingSenderId: "417308170977",
        appId: "1:417308170977:web:ef0cd85423f830f4ecb5a0"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── STATE ──────────────────────────────────────────────────
    let resources = { gold: 750, elixir: 750 };
    let buildingsData = [];
    let selectedBuilding = null;   // type string when placing
    let dragActive = false;

    // ── BUILDING DEFINITIONS ────────────────────────────────────
    const shopItems = [
        { id: 'gold_mine',        name: 'Gold Mine',        size: 'size-2x2', cat: 'resources', cost: 150,  currency: 'gold'   },
        { id: 'elixir_collector', name: 'Elixir Collector', size: 'size-2x2', cat: 'resources', cost: 150,  currency: 'elixir' },
        { id: 'gold_storage',     name: 'Gold Storage',     size: 'size-3x3', cat: 'resources', cost: 300,  currency: 'gold'   },
        { id: 'elixir_storage',   name: 'Elixir Storage',   size: 'size-3x3', cat: 'resources', cost: 300,  currency: 'elixir' },
        { id: 'cannon',           name: 'Cannon',           size: 'size-2x2', cat: 'defense',   cost: 250,  currency: 'gold'   },
        { id: 'archer_tower',     name: 'Archer Tower',     size: 'size-2x2', cat: 'defense',   cost: 400,  currency: 'gold'   },
        { id: 'walls',            name: 'Walls',            size: 'size-1x1', cat: 'defense',   cost: 50,   currency: 'gold'   },
        { id: 'barracks',         name: 'Barracks',         size: 'size-2x2', cat: 'army',      cost: 200,  currency: 'elixir' },
        { id: 'army_camp',        name: 'Army Camp',        size: 'size-4x4', cat: 'army',      cost: 500,  currency: 'elixir' },
    ];

    function getSizeClass(type) {
        if (type === 'townhall1') return 'size-4x4';
        const item = shopItems.find(s => s.id === type);
        return item ? item.size : 'size-2x2';
    }

    // ── GRID SETUP ─────────────────────────────────────────────
    const grassUrls = [
        'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass.png?raw=true',
        'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass1.png?raw=true',
        'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass2.png?raw=true',
        'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass3.png?raw=true',
        'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/grid/grass4.png?raw=true'
    ];

    function setupGrid() {
        const gridLayer = document.getElementById('grid-layer');
        for (let i = 0; i < 1600; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}`;
            tile.style.backgroundImage = `url('${grassUrls[Math.floor(Math.random() * grassUrls.length)]}')`;

            tile.addEventListener('click', (e) => {
                e.stopPropagation();
                if (dragActive) return;

                // If we're in placement mode, place the building
                if (selectedBuilding) {
                    placeBuilding(i, selectedBuilding);
                    return;
                }

                // Otherwise try to collect from the building on this tile
                collectResources(i);
            });

            gridLayer.appendChild(tile);
        }
    }

    // ── SHOP ────────────────────────────────────────────────────
    let activeCategory = 'all';

    function populateShop() {
        const container = document.getElementById('shop-items-container');
        container.innerHTML = '';
        const filtered = activeCategory === 'all' ? shopItems : shopItems.filter(i => i.cat === activeCategory);

        filtered.forEach(item => {
            const canAfford = resources[item.currency] >= item.cost;
            const div = document.createElement('div');
            div.className = 'shop-item';
            div.style.opacity = canAfford ? '1' : '0.55';

            const costColor = canAfford ? (item.currency === 'gold' ? 'cost-gold' : 'cost-elixir') : 'cost-insufficient';
            const coinSrc = item.currency === 'gold'
                ? 'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/coin.png?raw=true'
                : 'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/elixir.png?raw=true';

            div.innerHTML = `
                <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/${item.id}.png?raw=true" alt="${item.name}">
                <div class="shop-item-name">${item.name}</div>
                <div class="shop-item-cost ${costColor}">
                    <img src="${coinSrc}" alt="">${item.cost.toLocaleString()}
                </div>
            `;
            div.addEventListener('click', () => {
                if (!canAfford) {
                    // Flash red if can't afford
                    div.style.borderColor = '#ff3333';
                    setTimeout(() => div.style.borderColor = '', 500);
                    return;
                }
                selectedBuilding = item.id;
                document.getElementById('shop-layer').classList.remove('open');
                document.getElementById('placement-cursor').style.display = 'block';
                document.querySelectorAll('.tile').forEach(t => t.classList.add('placing-mode'));
            });
            container.appendChild(div);
        });
    }

    // Tab switching
    document.querySelectorAll('.shop-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeCategory = tab.dataset.cat;
            populateShop();
        });
    });

    // ── BUILDING PLACEMENT ──────────────────────────────────────

    // Get the screen-space center of a tile element
    function getTileScreenCenter(tile) {
        const rect = tile.getBoundingClientRect();
        return {
            x: rect.left + rect.width / 2,
            y: rect.top  + rect.height / 2
        };
    }

    // Convert screen coords → coords relative to the building-layer (which is inside #game-viewport)
    function screenToLayer(sx, sy) {
        const vpRect = document.getElementById('game-viewport').getBoundingClientRect();
        return { x: sx - vpRect.left, y: sy - vpRect.top };
    }

    function placeBuilding(tileId, type, shouldSave = true) {
        const tile = document.getElementById(`tile-${tileId}`);
        if (!tile) return;

        // Don't stack two buildings on the same tile
        if (document.querySelector(`.building-wrapper[data-tile="${tileId}"]`)) {
            // Show a brief "occupied" message at tile screen position
            const sc = getTileScreenCenter(tile);
            const lp = screenToLayer(sc.x, sc.y);
            const msg = document.createElement('div');
            msg.textContent = '❌ Occupied!';
            msg.style.cssText = `position:absolute;left:${lp.x}px;top:${lp.y}px;transform:translate(-50%,-100%);color:#fff;font-size:15px;font-family:'Luckiest Guy',cursive;text-shadow:2px 2px #000;pointer-events:none;z-index:999;white-space:nowrap;animation:floatUp 1s forwards;`;
            document.getElementById('building-layer').appendChild(msg);
            setTimeout(() => msg.remove(), 1000);
            return;
        }

        const sizeClass = getSizeClass(type);
        const wrapper = document.createElement('div');
        wrapper.className = `building-wrapper ${sizeClass}`;
        wrapper.dataset.tile = tileId;

        // Coin/elixir bubble (icon only, no text)
        const bubble = document.createElement('div');
        bubble.className = 'collect-bubble';
        const isGoldType    = type === 'gold_mine';
        const isElixirType  = type === 'elixir_collector';
        if (isGoldType || isElixirType) {
            const icon = document.createElement('img');
            icon.src = isGoldType
                ? 'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/coin.png?raw=true'
                : 'https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/currency/elixir.png?raw=true';
            icon.alt = '';
            bubble.appendChild(icon);
        }

        const canvas = document.createElement('img');
        canvas.className = 'building-canvas';
        canvas.src = `https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/${type}.png?raw=true`;
        canvas.alt = type;

        wrapper.appendChild(bubble);
        wrapper.appendChild(canvas);

        // Position wrapper on the building layer in SCREEN SPACE
        const sc = getTileScreenCenter(tile);
        const lp = screenToLayer(sc.x, sc.y);
        wrapper.style.left = lp.x + 'px';
        wrapper.style.top  = lp.y + 'px';

        document.getElementById('building-layer').appendChild(wrapper);

        // Click to collect
        wrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!dragActive) collectResources(tileId);
        });

        // Bounce-in
        wrapper.style.opacity = '0';
        wrapper.style.transform = 'translate(-50%, -100%) scale(0.5)';
        requestAnimationFrame(() => {
            wrapper.style.transition = 'opacity 0.25s, transform 0.25s';
            wrapper.style.opacity = '1';
            wrapper.style.transform = 'translate(-50%, -100%) scale(1)';
        });

        if (shouldSave) {
            const item = shopItems.find(s => s.id === type);
            if (item) {
                resources[item.currency] -= item.cost;
                updateUI();
            }
            buildingsData.push({ tileId, type, stored: 0 });
            saveGame();
        }

        cancelPlacement();
    }

    // When the world pans, reposition all building wrappers to stay over their tiles
    function repositionAllBuildings() {
        buildingsData.forEach(b => {
            const tile    = document.getElementById(`tile-${b.tileId}`);
            const wrapper = document.querySelector(`.building-wrapper[data-tile="${b.tileId}"]`);
            if (!tile || !wrapper) return;
            const sc = getTileScreenCenter(tile);
            const lp = screenToLayer(sc.x, sc.y);
            // Update without transition so it tracks smoothly
            const prev = wrapper.style.transition;
            wrapper.style.transition = 'none';
            wrapper.style.left = lp.x + 'px';
            wrapper.style.top  = lp.y + 'px';
            // Restore after a frame
            requestAnimationFrame(() => { wrapper.style.transition = prev; });
        });
    }

    function cancelPlacement() {
        selectedBuilding = null;
        document.getElementById('placement-cursor').style.display = 'none';
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('placing-mode'));
    }

    // ESC cancels placement
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') cancelPlacement();
    });

    // ── RESOURCE COLLECTION ─────────────────────────────────────
    function collectResources(tileId) {
        const b = buildingsData.find(item => item.tileId === tileId);
        if (!b || b.stored === 0) return;

        if (b.type === 'gold_mine')        resources.gold   += b.stored;
        if (b.type === 'elixir_collector') resources.elixir += b.stored;

        const wrapper = document.querySelector(`.building-wrapper[data-tile="${tileId}"]`);
        if (wrapper) showFloatingMsgOnWrapper(wrapper, `+${b.stored} ${b.type === 'gold_mine' ? '🪙' : '🔮'}`);

        b.stored = 0;
        updateUI();
        updateBubbles();
        saveGame();
    }

    function showFloatingMsgOnWrapper(wrapper, text) {
        const msg = document.createElement('div');
        msg.textContent = text;
        msg.style.cssText = `
            position:absolute; left:50%; bottom:100%;
            transform:translateX(-50%);
            color:#fff; font-size:16px; font-family:'Luckiest Guy',cursive;
            text-shadow:2px 2px #000; pointer-events:none;
            z-index:999; white-space:nowrap;
            animation: floatUp 1s forwards;
        `;
        wrapper.appendChild(msg);
        setTimeout(() => msg.remove(), 1000);
    }

    // Add float-up keyframe once
    const style = document.createElement('style');
    style.textContent = `@keyframes floatUp { 0%{opacity:1;transform:translateX(-50%) translateY(0)} 100%{opacity:0;transform:translateX(-50%) translateY(-40px)} }`;
    document.head.appendChild(style);

    // ── RESOURCE TICK ───────────────────────────────────────────
    setInterval(() => {
        buildingsData.forEach(b => {
            if (b.type === 'gold_mine' || b.type === 'elixir_collector') {
                b.stored = (b.stored || 0) + 1;
            }
        });
        updateBubbles();
    }, 3000);

    function updateBubbles() {
        buildingsData.forEach(b => {
            const wrapper = document.querySelector(`.building-wrapper[data-tile="${b.tileId}"]`);
            if (!wrapper) return;
            const bubble = wrapper.querySelector('.collect-bubble');
            if (!bubble) return;
            // Only gold_mine and elixir_collector have bubbles
            if (b.type === 'gold_mine' || b.type === 'elixir_collector') {
                if (b.stored > 0) bubble.classList.add('visible');
                else              bubble.classList.remove('visible');
            }
        });
    }

    function updateUI() {
        document.getElementById('gold-val').textContent   = resources.gold;
        document.getElementById('elixir-val').textContent = resources.elixir;
    }

    // ── FIREBASE ────────────────────────────────────────────────
    function saveGame() {
        set(ref(db, 'users/player1'), { resources, buildings: buildingsData });
    }

    function loadGame() {
        onValue(ref(db, 'users/player1'), (snap) => {
            const d = snap.val();
            if (d) {
                resources = d.resources || resources;
                updateUI();
                if (d.buildings) {
                    buildingsData = d.buildings;
                    buildingsData.forEach(b => placeBuilding(b.tileId, b.type, false));
                }
            } else {
                // New player — place Town Hall in roughly the centre
                placeBuilding(820, 'townhall1', true);
            }
        }, { onlyOnce: true });
    }

    // ── CAMERA PANNING ──────────────────────────────────────────
    const world    = document.getElementById('world-surface');
    const viewport = document.getElementById('game-viewport');

    let isPanning = false;
    let panStartX, panStartY;
    let currentX = (window.innerWidth  / 2) - 2500;
    let currentY = (window.innerHeight / 2) - 2500;

    function applyWorldPos() {
        world.style.left = currentX + 'px';
        world.style.top  = currentY + 'px';
    }
    applyWorldPos();

    viewport.addEventListener('mousedown', (e) => {
        // Don't start pan if clicking shop button or inside shop
        if (e.target.closest('#shop-trigger') || e.target.closest('#shop-layer')) return;
        isPanning  = true;
        dragActive = false;
        panStartX  = e.clientX - currentX;
        panStartY  = e.clientY - currentY;
        viewport.classList.add('grabbing');
    });

    window.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        const dx = Math.abs(e.clientX - (panStartX + currentX));
        const dy = Math.abs(e.clientY - (panStartY + currentY));
        if (dx > 4 || dy > 4) dragActive = true;
        currentX = e.clientX - panStartX;
        currentY = e.clientY - panStartY;
        applyWorldPos();
        repositionAllBuildings();
    });

    window.addEventListener('mouseup', () => {
        isPanning = false;
        viewport.classList.remove('grabbing');
        // Reset dragActive slightly after so the click handler can check it
        setTimeout(() => { dragActive = false; }, 10);
    });

    // Touch support for mobile
    viewport.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        isPanning  = true;
        dragActive = false;
        panStartX  = e.touches[0].clientX - currentX;
        panStartY  = e.touches[0].clientY - currentY;
    }, { passive: true });

    viewport.addEventListener('touchmove', (e) => {
        if (!isPanning || e.touches.length !== 1) return;
        dragActive = true;
        currentX = e.touches[0].clientX - panStartX;
        currentY = e.touches[0].clientY - panStartY;
        applyWorldPos();
        repositionAllBuildings();
    }, { passive: true });

    viewport.addEventListener('touchend', () => {
        isPanning = false;
        setTimeout(() => { dragActive = false; }, 10);
    });

    // ── SHOP UI ─────────────────────────────────────────────────
    document.getElementById('shop-trigger').addEventListener('click', () => {
        cancelPlacement();
        populateShop();
        document.getElementById('shop-layer').classList.add('open');
    });
    document.getElementById('close-shop').addEventListener('click', () => {
        document.getElementById('shop-layer').classList.remove('open');
    });
    // Click outside shop to close
    document.getElementById('shop-layer').addEventListener('click', (e) => {
        if (e.target === document.getElementById('shop-layer'))
            document.getElementById('shop-layer').classList.remove('open');
    });

    // ── INTRO ────────────────────────────────────────────────────
    window.startIntro = () => {
        document.getElementById('click-prompt').style.display = 'none';
        document.getElementById('intro-audio').play().catch(() => {});

        setTimeout(() => {
            document.getElementById('intro-0').classList.remove('active');
            document.getElementById('intro-1').classList.add('active');

            setTimeout(() => {
                document.getElementById('intro-overlay').classList.add('hidden');
                const bg = document.getElementById('bg-music');
                bg.src = "https://nu.vgmtreasurechest.com/soundtracks/clash-of-clans-soundtrack/zdwyzfcv/04.%20Home%20Music%20Part%201.mp3";
                bg.play().catch(() => {});
            }, 2500);
        }, 2500);
    };

    // ── BOOT ─────────────────────────────────────────────────────
    setupGrid();
    populateShop();
    loadGame();
</script>
</body>
</html>
