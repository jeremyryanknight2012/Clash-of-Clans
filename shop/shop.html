<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Buildings & Traps</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Luckiest Guy', cursive;
            overflow: hidden;
            color: white;
        }

        .shop-container {
            width: 98vw;
            height: 95vh;
            background: #d3d7c6; 
            border: 4px solid #1a1a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Nav Icons */
        .top-nav {
            background: #000;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            padding-bottom: 5px;
        }

        .nav-icon {
            width: 50px;
            height: 50px;
            background: #8e8e8e;
            border: 3px solid #444;
            border-radius: 8px;
        }

        .nav-icon.active {
            background: #fdfdfd;
            border-color: #fff;
            transform: translateY(-5px);
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #ff3131;
            border: 3px solid #000;
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
        }

        .category-header {
            text-align: center;
            padding: 10px 0;
        }

        .title-text {
            color: #333;
            font-size: 28px;
            text-shadow: 1px 1px #fff;
            margin: 0 0 5px 0;
        }

        .sub-tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .tab {
            background: #5d6154;
            padding: 4px 20px;
            border-radius: 6px;
            border: 2px solid #333;
            font-size: 13px;
        }

        .tab.active {
            background: #84a95b;
        }

        /* Scrollable Area */
        .item-list-container {
            flex-grow: 1;
            background-color: #3b2d38; 
            margin: 5px 10px 10px 10px;
            border-radius: 8px;
            border: 3px solid #1a1a1a;
            overflow-x: auto; /* Side scrolling */
            overflow-y: hidden; /* No vertical scrolling */
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .grid {
            display: inline-grid;
            grid-template-rows: repeat(2, 1fr); /* Two rows */
            grid-auto-flow: column; /* Fill columns first to force side-scroll */
            gap: 8px;
            padding: 10px;
            height: calc(100% - 20px);
        }

        /* Scaled Down Building Cards */
        .card {
            width: 140px;
            height: 160px; /* Reduced height to fit two rows without vertical scroll */
            background: #8e8e8e;
            border: 3px solid #1a1a1a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .card-header {
            font-size: 11px;
            margin-top: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 1px 1px #000;
        }

        .building-img {
            width: 70px;
            height: 70px;
            margin-top: 8px;
            object-fit: contain;
        }

        .price-bar {
            width: 100%;
            background: rgba(0,0,0,0.4);
            position: absolute;
            bottom: 0;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom-left-radius: 7px;
            border-bottom-right-radius: 7px;
            font-size: 16px;
        }

        /* Bottom Resource Footer */
        .resource-footer {
            height: 45px;
            background: #84a95b;
            border-top: 4px solid #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .res-item {
            display: flex;
            align-items: center;
            font-size: 16px;
            text-shadow: 2px 2px #000;
        }

        /* Sideways Scrollbar */
        .item-list-container::-webkit-scrollbar {
            height: 14px;
        }
        .item-list-container::-webkit-scrollbar-track {
            background: #222;
            border-radius: 10px;
        }
        .item-list-container::-webkit-scrollbar-thumb {
            background: #84a95b;
            border: 2px solid #000;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="shop-container">
        <div class="close-btn" onclick="window.location.href='../index.html'">X</div>

        <div class="top-nav">
            <div class="nav-icon active"></div>
            <div class="nav-icon"></div>
            <div class="nav-icon"></div>
            <div class="nav-icon"></div>
        </div>

        <div class="category-header">
            <div class="title-text">BUILDINGS & TRAPS</div>
            <div class="sub-tabs">
                <div class="tab active">ARMY</div>
                <div class="tab">RESOURCES</div>
                <div class="tab">DEFENSES</div>
                <div class="tab">TRAPS</div>
            </div>
        </div>

        <div class="item-list-container">
            <div class="grid">
                <div class="card"><div class="card-header">Army Camp</div><img src="../images/army_camp.png" class="building-img"><div class="price-bar">200 💧</div></div>
                <div class="card"><div class="card-header">Barracks</div><img src="../images/barracks.png" class="building-img"><div class="price-bar">100 💧</div></div>
                <div class="card"><div class="card-header">Laboratory</div><img src="../images/laboratory.png" class="building-img"><div class="price-bar">5 000 💧</div></div>
                <div class="card"><div class="card-header">Spell Factory</div><img src="../images/spell_factory.png" class="building-img"><div class="price-bar">150 000 💧</div></div>
                <div class="card"><div class="card-header">Cannon</div><img src="../images/cannon.png" class="building-img"><div class="price-bar">250 🟡</div></div>
                <div class="card"><div class="card-header">Archer Tower</div><img src="../images/archer_tower.png" class="building-img"><div class="price-bar">1 000 🟡</div></div>
                <div class="card"><div class="card-header">Gold Mine</div><img src="../images/gold_mine.png" class="building-img"><div class="price-bar">150 🟡</div></div>
                <div class="card"><div class="card-header">Elixir Collector</div><img src="../images/elixir_collector.png" class="building-img"><div class="price-bar">150 💧</div></div>
            </div>
        </div>

        <div class="resource-footer">
            <div class="res-item">🟡 185 617</div>
            <div class="res-item">💧 192 079</div>
            <div class="res-item">💎 15</div>
        </div>
    </div>

</body>
</html>
