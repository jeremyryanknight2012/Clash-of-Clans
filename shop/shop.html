<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Buildings & Traps</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Luckiest Guy', cursive;
            overflow: hidden;
            color: white;
        }

        /* Main Shop Container */
        .shop-container {
            width: 98vw;
            height: 95vh;
            background: #d3d7c6; /* Light gray-green background */
            border: 4px solid #1a1a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Top Icon Bar */
        .top-nav {
            background: #000;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            padding-bottom: 5px;
        }

        .nav-icon {
            width: 50px;
            height: 50px;
            background: #8e8e8e;
            border: 3px solid #444;
            border-radius: 8px;
            cursor: pointer;
        }

        .nav-icon.active {
            background: #fdfdfd;
            border-color: #fff;
            transform: translateY(-5px);
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #ff3131;
            border: 3px solid #000;
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 20px;
        }

        /* Category Tabs */
        .category-header {
            text-align: center;
            padding: 10px 0;
        }

        .title-text {
            color: #333;
            font-size: 28px;
            text-shadow: 1px 1px #fff;
            margin-bottom: 10px;
        }

        .sub-tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .tab {
            background: #5d6154;
            padding: 5px 25px;
            border-radius: 6px;
            border: 2px solid #333;
            font-size: 14px;
            cursor: pointer;
        }

        .tab.active {
            background: #84a95b;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        /* Item Grid */
        .item-list {
            flex-grow: 1;
            overflow-x: auto;
            padding: 15px;
            white-space: nowrap;
        }

        .grid {
            display: inline-grid;
            grid-template-rows: repeat(2, 1fr);
            grid-auto-flow: column;
            gap: 12px;
        }

        /* Building Card */
        .card {
            width: 170px;
            height: 200px;
            background: #8e8e8e;
            border: 3px solid #444;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        }

        .card-header {
            font-size: 12px;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-i {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #eee;
            color: #333;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
        }

        .building-img {
            width: 90px;
            height: 90px;
            margin: 15px 0;
            object-fit: contain;
        }

        .build-count {
            position: absolute;
            bottom: 45px;
            right: 10px;
            font-size: 12px;
        }

        .price-bar {
            width: 100%;
            background: rgba(0,0,0,0.3);
            position: absolute;
            bottom: 0;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom-left-radius: 7px;
            border-bottom-right-radius: 7px;
            font-size: 18px;
        }

        /* Bottom Resource Bar */
        .resource-footer {
            height: 50px;
            background: #84a95b;
            border-top: 4px solid #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .res-item {
            display: flex;
            align-items: center;
            font-size: 18px;
            text-shadow: 2px 2px #000;
        }

        .res-item span { margin-left: 10px; }

        /* Scrollbar */
        .item-list::-webkit-scrollbar { height: 16px; }
        .item-list::-webkit-scrollbar-track { background: #333; border-radius: 10px; margin: 0 40px; }
        .item-list::-webkit-scrollbar-thumb { background: #84a95b; border: 2px solid #000; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="shop-container">
        <div class="close-btn" onclick="window.location.href='../index.html'">X</div>

        <div class="top-nav">
            <div class="nav-icon active"></div> <div class="nav-icon"></div>
            <div class="nav-icon"></div>
            <div class="nav-icon"></div>
        </div>

        <div class="category-header">
            <div class="title-text">BUILDINGS & TRAPS</div>
            <div class="sub-tabs">
                <div class="tab active">ARMY</div>
                <div class="tab">RESOURCES</div>
                <div class="tab">DEFENSES</div>
                <div class="tab">TRAPS</div>
            </div>
        </div>

        <div class="item-list">
            <div class="grid">
                <div class="card">
                    <div class="info-i">i</div>
                    <div class="card-header">Army Camp</div>
                    <img src="../images/army_camp.png" class="building-img">
                    <div class="build-count">Built: 2/2</div>
                    <div class="price-bar">200 💧</div>
                </div>

                <div class="card">
                    <div class="info-i">i</div>
                    <div class="card-header">Laboratory</div>
                    <img src="../images/laboratory.png" class="building-img">
                    <div class="build-count">Built: 1/1</div>
                    <div class="price-bar">5 000 💧</div>
                </div>

                <div class="card" style="border-color: #00e5ff;">
                    <div class="info-i">i</div>
                    <div class="card-header">Builder's Hut</div>
                    <img src="../images/builders_hut.png" class="building-img">
                    <div class="build-count">3/5</div>
                    <div class="price-bar" style="background: rgba(0, 229, 255, 0.2);">1 000 💎</div>
                </div>

                </div>
        </div>

        <div class="resource-footer">
            <div class="res-item">🟡 <span>185 617</span></div>
            <div class="res-item">💧 <span>192 079</span></div>
            <div class="res-item">💎 <span>15</span></div>
        </div>
    </div>

</body>
</html>
