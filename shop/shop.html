<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Buildings & Traps</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Luckiest Guy', cursive;
            overflow: hidden;
            color: white;
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
        }

        .shop-container {
            width: 98vw;
            height: 95vh;
            background: #d3d7c6; 
            border: 4px solid #1a1a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-nav {
            background: #000;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            padding-bottom: 5px;
        }

        .nav-icon {
            width: 50px;
            height: 50px;
            background: #8e8e8e;
            border: 3px solid #444;
            border-radius: 8px;
        }

        .nav-icon.active {
            background: #fdfdfd;
            border-color: #fff;
            transform: translateY(-5px);
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #ff3131;
            border: 3px solid #000;
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
        }

        .category-header {
            text-align: center;
            padding: 10px 0;
        }

        .title-text {
            color: #333;
            font-size: 28px;
            text-shadow: 2px 2px 0px #fff;
            margin: 0 0 5px 0;
        }

        .sub-tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .tab {
            background: #5d6154;
            padding: 4px 20px;
            border-radius: 6px;
            border: 2px solid #333;
            font-size: 13px;
        }

        .tab.active {
            background: #84a95b;
        }

        .item-list-container {
            flex-grow: 1;
            background-color: #3b2d38; 
            margin: 5px 10px 10px 10px;
            border-radius: 8px;
            border: 3px solid #1a1a1a;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .grid {
            display: inline-grid;
            grid-template-rows: repeat(2, 1fr);
            grid-auto-flow: column;
            gap: 8px;
            padding: 10px;
            height: calc(100% - 20px);
        }

        .card {
            /* Width adjusted to match the internal PNG proportions precisely */
            width: 130px; 
            height: 160px;
            background: #8e8e8e;
            border: 3px solid #1a1a1a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-header {
            font-size: 13px;
            margin-top: 6px;
            color: #fff;
        }

        .building-img {
            width: 75px;
            height: 75px;
            margin-top: 8px;
            object-fit: contain;
        }

        /* The specific style for the PNG-only Army Camp card */
        .full-png-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill; 
        }

        .price-bar {
            width: 100%;
            background: rgba(0,0,0,0.4);
            position: absolute;
            bottom: 0;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom-left-radius: 7px;
            border-bottom-right-radius: 7px;
            font-size: 16px;
        }

        .resource-footer {
            height: 45px;
            background: #84a95b;
            border-top: 4px solid #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .res-item {
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .item-list-container::-webkit-scrollbar { height: 14px; }
        .item-list-container::-webkit-scrollbar-track { background: #222; border-radius: 10px; }
        .item-list-container::-webkit-scrollbar-thumb { background: #84a95b; border: 2px solid #000; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="shop-container">
        <div class="close-btn" onclick="window.location.href='../index.html'">X</div>

        <div class="top-nav">
            <div class="nav-icon active"></div>
            <div class="nav-icon"></div>
            <div class="nav-icon"></div>
            <div class="nav-icon"></div>
        </div>

        <div class="category-header">
            <div class="title-text">Buildings & traps</div>
            <div class="sub-tabs">
                <div class="tab active">Army</div>
                <div class="tab">Resources</div>
                <div class="tab">Defenses</div>
                <div class="tab">Traps</div>
            </div>
        </div>

        <div class="item-list-container">
            <div class="grid">
                <div class="card">
                    <img src="https://github.com/jeremyryanknight2012/Clash-of-Clans/blob/main/shop/army-camp-no-build.png?raw=true" class="full-png-img">
                </div>

                <div class="card"><div class="card-header">Barracks</div><img src="../images/barracks.png" class="building-img"><div class="price-bar">100 💧</div></div>
                <div class="card"><div class="card-header">Laboratory</div><img src="../images/laboratory.png" class="building-img"><div class="price-bar">5 000 💧</div></div>
                <div class="card"><div class="card-header">Spell factory</div><img src="../images/spell_factory.png" class="building-img"><div class="price-bar">150 000 💧</div></div>
                <div class="card"><div class="card-header">Cannon</div><img src="../images/cannon.png" class="building-img"><div class="price-bar">250 🟡</div></div>
                <div class="card"><div class="card-header">Archer tower</div><img src="../images/archer_tower.png" class="building-img"><div class="price-bar">1 000 🟡</div></div>
                <div class="card"><div class="card-header">Gold mine</div><img src="../images/gold_mine.png" class="building-img"><div class="price-bar">150 🟡</div></div>
                <div class="card"><div class="card-header">Elixir collector</div><img src="../images/elixir_collector.png" class="building-img"><div class="price-bar">150 💧</div></div>
            </div>
        </div>

        <div class="resource-footer">
            <div class="res-item">🟡 185 617</div>
            <div class="res-item">💧 192 079</div>
            <div class="res-item">💎 15</div>
        </div>
    </div>

</body>
</html>
