<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Buildings & Traps</title>
    <style>
        :root {
            --bg-panel: #c5c9b8;
            --item-bg: #8e8e8e;
            --border-dark: #333;
            --text-gold: #ffcc00;
        }

        body {
            margin: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* Main Window */
        .shop-window {
            width: 95vw;
            height: 90vh;
            background-color: var(--bg-panel);
            border: 4px solid #000;
            border-radius: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #000;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header-title {
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px #000;
        }

        .close-btn {
            position: absolute;
            right: 10px;
            top: -5px;
            background: #e74c3c;
            color: white;
            padding: 5px 12px;
            border: 3px solid #000;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            background: #aeb2a2;
        }

        .tab {
            background: #5e6354;
            color: white;
            padding: 5px 20px;
            border-radius: 5px;
            border: 2px solid #333;
            font-size: 14px;
            cursor: pointer;
        }

        .tab.active {
            background: #84a95b;
        }

        /* Scrollable Content */
        .content-wrapper {
            flex-grow: 1;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 20px;
            white-space: nowrap;
            /* Custom Scrollbar Styling */
        }

        .content-wrapper::-webkit-scrollbar {
            height: 15px;
        }

        .content-wrapper::-webkit-scrollbar-track {
            background: #333;
            border-radius: 10px;
            margin: 0 50px;
        }

        .content-wrapper::-webkit-scrollbar-thumb {
            background: #84a95b;
            border: 2px solid #000;
            border-radius: 10px;
        }

        .grid {
            display: inline-grid;
            grid-template-rows: repeat(2, 1fr);
            grid-auto-flow: column;
            gap: 15px;
            height: 100%;
        }

        /* Shop Item Card */
        .item-card {
            width: 160px;
            height: 180px;
            background: var(--item-bg);
            border: 3px solid var(--border-dark);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .item-name {
            font-size: 12px;
            color: white;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .item-img {
            width: 80px;
            margin: 10px 0;
        }

        .price-tag {
            background: rgba(0,0,0,0.6);
            width: 100%;
            text-align: center;
            color: white;
            padding: 5px 0;
            position: absolute;
            bottom: 0;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        /* Footer Resource Bar */
        .footer-bar {
            height: 40px;
            background: #84a95b;
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: center;
            border-top: 3px solid #000;
        }

        .resource {
            display: flex;
            align-items: center;
            color: white;
            font-size: 14px;
        }

        .resource img {
            width: 20px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="shop-window">
    <div class="header">
        <div class="header-title">BUILDINGS & TRAPS</div>
        <div class="close-btn" onclick="window.location.href='../index.html'">X</div>
    </div>

    <div class="tabs">
        <div class="tab active">ARMY</div>
        <div class="tab">RESOURCES</div>
        <div class="tab">DEFENSES</div>
        <div class="tab">TRAPS</div>
    </div>

    <div class="content-wrapper">
        <div class="grid">
            <div class="item-card">
                <span class="item-name">Barracks</span>
                <img src="../images/barracks.png" class="item-img">
                <div class="price-tag">100 💧</div>
            </div>
            <div class="item-card">
                <span class="item-name">Laboratory</span>
                <img src="../images/laboratory.png" class="item-img">
                <div class="price-tag">5 000 💧</div>
            </div>
            <div class="item-card">
                <span class="item-name">Cannon</span>
                <img src="../images/cannon.png" class="item-img">
                <div class="price-tag">250 🟡</div>
            </div>
            <div class="item-card">
                <span class="item-name">Archer Tower</span>
                <img src="../images/archer-tower.png" class="item-img">
                <div class="price-tag">1 000 🟡</div>
            </div>
             <div class="item-card"><span class="item-name">Wizard Tower</span><img src="../images/wizard-tower.png" class="item-img"><div class="price-tag">100 000 🟡</div></div>
             <div class="item-card"><span class="item-name">Air Defense</span><img src="../images/air-defense.png" class="item-img"><div class="price-tag">22 000 🟡</div></div>
             <div class="item-card"><span class="item-name">Mortar</span><img src="../images/mortar.png" class="item-img"><div class="price-tag">5 000 🟡</div></div>
             <div class="item-card"><span class="item-name">X-Bow</span><img src="../images/xbow.png" class="item-img"><div class="price-tag">1M 🟡</div></div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="resource">🟡 1 000</div>
        <div class="resource">💧 750</div>
        <div class="resource">💎 500</div>
    </div>
</div>

</body>
</html>
