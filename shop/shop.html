<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Luckiest Guy', cursive;
            overflow: hidden;
        }

        .shop-window {
            width: 95vw;
            height: 90vh;
            background-color: #c5c9b8;
            border: 4px solid #000;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: #000;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .close-btn {
            position: absolute;
            right: 15px;
            top: 5px;
            background: #e74c3c;
            color: white;
            padding: 5px 15px;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
        }

        .content-wrapper {
            flex-grow: 1;
            overflow-x: auto;
            padding: 20px;
            white-space: nowrap;
        }

        /* The horizontal scrollbar */
        .content-wrapper::-webkit-scrollbar {
            height: 18px;
        }

        .content-wrapper::-webkit-scrollbar-track {
            background: #333;
            border-radius: 10px;
            margin: 0 100px;
            border: 2px solid #000;
        }

        .content-wrapper::-webkit-scrollbar-thumb {
            background: #84a95b;
            border: 2px solid #000;
            border-radius: 10px;
        }

        .footer-bar {
            height: 50px;
            background: #84a95b;
            border-top: 4px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
    </style>
</head>
<body>

<div class="shop-window">
    <div class="header">
        <div class="close-btn" onclick="window.location.href='../index.html'">X</div>
    </div>

    <div class="content-wrapper">
        </div>

    <div class="footer-bar">
        </div>
</div>

</body>
</html>
